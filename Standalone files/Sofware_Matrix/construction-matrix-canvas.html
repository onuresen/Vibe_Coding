<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Construction Software Matrix Canvas</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root {
            --bg: #0b0f14;
            --grid-line: #1e293b;
            --text: #e2e8f0;
            --accent: #38bdf8;
            --node-bg: #1e293b;
            --node-border: #334155;
            --header-bg: #111827;
        }

        body {
            margin: 0;
            overflow: hidden;
            /* Canvas behavior */
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
        }

        /* Matrix Layout Elements */
        #canvas {
            position: relative;
            width: 5000px;
            /* Large workspace */
            height: 5000px;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 100px 100px;
            padding-top: 60px;
            padding-left: 200px;
        }

        /* Top Bar for Control */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--node-border);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
        }

        .axis-label-x {
            position: fixed;
            top: 50px;
            left: 200px;
            right: 0;
            height: 40px;
            display: flex;
            background: var(--header-bg);
            z-index: 900;
            border-bottom: 1px solid var(--accent);
        }

        .phase-header {
            width: 400px;
            /* Fixed width for matrix column */
            text-align: center;
            line-height: 40px;
            font-weight: bold;
            border-right: 1px solid var(--grid-line);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .axis-label-y {
            position: fixed;
            top: 90px;
            left: 0;
            bottom: 0;
            width: 200px;
            background: var(--header-bg);
            z-index: 900;
            border-right: 1px solid var(--accent);
        }

        .category-header {
            height: 300px;
            /* Fixed height for matrix row */
            display: flex;
            align-items: center;
            justify-content: center;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            border-bottom: 1px solid var(--grid-line);
            font-weight: bold;
            font-size: 0.8rem;
        }

        /* Small Moveable Node */
        .node {
            position: absolute;
            width: 120px;
            background: var(--node-bg);
            border: 1px solid var(--node-border);
            border-radius: 8px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: grab;
            transition: box-shadow 0.2s;
            z-index: 10;
            touch-action: none;
        }

        .node:active {
            cursor: grabbing;
        }

        .node:hover {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
            z-index: 100;
        }

        .node img {
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 4px;
            object-fit: contain;
            pointer-events: none;
            /* Let drag events pass through */
        }

        .node .name {
            font-size: 0.7rem;
            text-align: center;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .node-link {
            text-decoration: none;
            color: inherit;
        }

        /* Hover Tooltip */
        .node:hover::after {
            content: attr(data-details);
            position: absolute;
            bottom: 110%;
            background: #000;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            white-space: nowrap;
            z-index: 1000;
        }

        input[type="file"] {
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <header>
        <span style="font-weight:bold; color:var(--accent)">Construction Tech Matrix</span>
        <input type="file" id="csvFile" accept=".csv" />
        <small style="color:var(--muted)">Drag nodes to reorganize. Icons auto-load from URL.</small>
    </header>

    <div class="axis-label-x" id="phaseLabels"></div>
    <div class="axis-label-y" id="categoryLabels"></div>

    <div id="canvas"></div>

    <script>
        let tools = [];
        const canvas = document.getElementById('canvas');

        function getLogoUrl(url) {
            if (!url) return 'https://via.placeholder.com/48?text=SW';
            const domain = url.replace(/^https?:\/\//, '').split('/')[0];
            // Try Google's service instead of Clearbit
            return `https://www.google.com/s2/favicons?sz=64&domain=${domain}`;
        }

        function parseCSV(text) {
            const lines = text.split('\n');
            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            return lines.slice(1).filter(l => l.trim()).map(line => {
                const values = line.split(',');
                const obj = {};
                headers.forEach((h, i) => obj[h] = values[i] ? values[i].trim() : '');
                return obj;
            });
        }

        function initMatrix(data) {
            const phases = [...new Set(data.map(t => t.phase || 'Other'))].sort();
            const categories = [...new Set(data.map(t => t.category || 'Other'))].sort();

            // Render Labels
            const pLabels = document.getElementById('phaseLabels');
            const cLabels = document.getElementById('categoryLabels');
            pLabels.innerHTML = '';
            cLabels.innerHTML = '';

            phases.forEach(p => pLabels.innerHTML += `<div class="phase-header">${p}</div>`);
            categories.forEach(c => cLabels.innerHTML += `<div class="category-header">${c}</div>`);

            // Place Nodes
            canvas.innerHTML = '';
            const cellWidth = 400;
            const cellHeight = 300;

            // Keep track of how many nodes are in each cell for staggering
            const cellCounts = {};

            data.forEach((t, index) => {
                const pIdx = phases.indexOf(t.phase || 'Other');
                const cIdx = categories.indexOf(t.category || 'Other');

                const cellKey = `${pIdx}-${cIdx}`;
                cellCounts[cellKey] = (cellCounts[cellKey] || 0) + 1;

                const node = document.createElement('div');
                node.className = 'node';
                node.setAttribute('data-details', `${t.name} | ${t.category}`);

                // Calculate initial position within matrix cell
                const xBase = pIdx * cellWidth + 20;
                const yBase = cIdx * cellHeight + 20;

                // Stagger logic
                const staggerX = ((cellCounts[cellKey] - 1) % 3) * 130;
                const staggerY = Math.floor((cellCounts[cellKey] - 1) / 3) * 70;

                node.style.left = (xBase + staggerX) + 'px';
                node.style.top = (yBase + staggerY) + 'px';

                const logo = getLogoUrl(t.url);
                const link = t.url ? (t.url.startsWith('http') ? t.url : 'https://' + t.url) : '#';

                node.innerHTML = `
                    <a href="${link}" target="_blank" class="node-link">
                        <img src="${logo}" onerror="this.src='https://via.placeholder.com/32?text=${t.name ? t.name[0] : 'S'}'">
                    </a>
                    <div class="name">${t.name}</div>
                `;

                canvas.appendChild(node);
            });

            setupDragging();
        }

        function setupDragging() {
            interact('.node').draggable({
                inertia: true,
                modifiers: [
                    interact.modifiers.restrictRect({
                        restriction: 'parent',
                        endOnly: true
                    })
                ],
                listeners: {
                    move(event) {
                        const target = event.target;
                        const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                        const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;

                        target.style.transform = `translate(${x}px, ${y}px)`;
                        target.setAttribute('data-x', x);
                        target.setAttribute('data-y', y);
                    }
                }
            });
        }

        document.getElementById('csvFile').addEventListener('change', async (e) => {
            const file = e.target.files?.[0];
            if (!file) return;
            const text = await file.text();
            tools = parseCSV(text);
            initMatrix(tools);
        });
    </script>
</body>

</html>
