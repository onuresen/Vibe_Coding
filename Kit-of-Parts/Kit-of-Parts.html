<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IC Configurator MVP</title>
    <style>
        body {
            margin: 0;
            background-color: #f4f4f4;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 12px 24px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background: #34495e;
        }

        #info {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #3498db;
            width: 250px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>

<body>

    <div id="ui">
        <button onclick="toggleExplode()">Toggle Explode View</button>
        <div style="font-size: 12px; color: #666;">Click elements to inspect</div>
    </div>

    <div id="info">
        <h3 id="info-title" style="margin: 0 0 10px 0; font-size: 16px;">Component</h3>
        <p id="info-meta" style="margin: 0; font-size: 14px; color: #555;"></p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { gsap } from 'https://cdn.skypack.dev/gsap';

        // --- Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf4f4f4);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 8, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- Component Data ---
        const components = [
            { id: 'Foundation', pos: [0, 0, 0], exp: [0, -1, 0], size: [4, 0.5, 4], color: 0x95a5a6, meta: 'Pre-cast Concrete Slab (Type A)' },
            { id: 'Structure', pos: [0, 1.25, 0], exp: [0, 1.25, 0], size: [3.8, 2, 3.8], color: 0x34495e, meta: 'Steel Frame - Smart BIM Standard', wire: true },
            { id: 'Bathroom Pod', pos: [0.8, 1.25, 0.8], exp: [2.5, 1.25, 2.5], size: [1.5, 1.8, 1.5], color: 0xe67e22, meta: 'Off-site Fabricated Unit 01' },
            { id: 'Cladding', pos: [-1.9, 1.25, 0], exp: [-3.5, 1.25, 0], size: [0.1, 2.2, 3.8], color: 0x27ae60, meta: 'Insulated Glass Panel' },
            { id: 'Interface Layer', pos: [0, 2.5, 0], exp: [0, 4, 0], size: [4, 0.1, 4], color: 0x3498db, meta: 'Data & Utilities Distribution Layer' }
        ];

        const meshGroup = new THREE.Group();
        const parts = [];

        components.forEach(data => {
            const geometry = new THREE.BoxGeometry(...data.size);
            const material = new THREE.MeshStandardMaterial({
                color: data.color,
                transparent: data.id.includes('Layer'),
                opacity: data.id.includes('Layer') ? 0.6 : 1
            });

            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(...data.pos);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData = data;

            // Add clean outlines
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 }));
            mesh.add(line);

            meshGroup.add(mesh);
            parts.push(mesh);
        });

        scene.add(meshGroup);

        // --- Interaction Logic ---
        let isExploded = false;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.toggleExplode = () => {
            isExploded = !isExploded;
            parts.forEach(part => {
                const target = isExploded ? part.userData.exp : part.userData.pos;
                gsap.to(part.position, {
                    x: target[0], y: target[1], z: target[2],
                    duration: 1, ease: "expo.out"
                });
            });
        };

        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(parts);
            const infoBox = document.getElementById('info');

            if (intersects.length > 0) {
                const obj = intersects[0].object;
                document.getElementById('info-title').innerText = obj.userData.id;
                document.getElementById('info-meta').innerText = obj.userData.meta;
                infoBox.style.opacity = 1;

                // Visual feedback
                gsap.fromTo(obj.scale, { x: 1, y: 1, z: 1 }, { x: 1.05, y: 1.05, z: 1.05, duration: 0.1, yoyo: true, repeat: 1 });
            } else {
                infoBox.style.opacity = 0;
            }
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>

</html>
