<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thinking Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f0f11;
      --surface:    #1a1a1f;
      --surface2:   #222228;
      --surface3:   #2a2a35;
      --border:     rgba(255,255,255,0.08);
      --border2:    rgba(255,255,255,0.14);
      --text:       #f0efe8;
      --text2:      #9998a0;
      --text3:      #55545c;
      --accent:     #b8f033;
      --accent-dim: rgba(184,240,51,0.07);
      --font-d:     'Syne', sans-serif;
      --font-b:     'DM Sans', sans-serif;
      --font-m:     'JetBrains Mono', monospace;
      --r:          14px;
      --r-sm:       8px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-b);
      overflow: hidden;
    }

    body { display: flex; }

    /* ── Sidebar ────────────────────────────────────── */
    .sidebar {
      width: 210px;
      min-width: 210px;
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-logo {
      height: 54px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }

    .sidebar-logo-mark {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      color: #111;
      font-family: var(--font-d);
      flex-shrink: 0;
    }

    .sidebar-logo-text {
      font-family: var(--font-d);
      font-size: 13.5px;
      font-weight: 800;
      letter-spacing: -0.2px;
      color: var(--text);
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 10px 8px;
    }

    .nav-group { margin-bottom: 6px; }

    .nav-group-label {
      font-family: var(--font-m);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text3);
      padding: 10px 8px 5px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      padding: 8px 10px;
      border-radius: var(--r-sm);
      border: none;
      background: transparent;
      color: var(--text2);
      font-family: var(--font-b);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      transition: background 0.1s, color 0.1s;
      line-height: 1;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active {
      background: var(--accent-dim);
      color: var(--accent);
    }
    .nav-item.active .nav-icon { opacity: 1; }

    .nav-icon {
      font-size: 14px;
      opacity: 0.55;
      flex-shrink: 0;
      width: 16px;
      text-align: center;
    }
    .nav-item.active .nav-icon,
    .nav-item:hover .nav-icon { opacity: 1; }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-family: var(--font-m);
      font-size: 10px;
      color: var(--text3);
      line-height: 1.6;
      flex-shrink: 0;
    }

    /* ── Main area ──────────────────────────────────── */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Session bar ────────────────────────────────── */
    .session-bar {
      height: 44px;
      min-height: 44px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      flex-shrink: 0;
    }

    .session-label {
      font-family: var(--font-m);
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #session-name {
      flex: 1;
      max-width: 300px;
      background: transparent;
      border: none;
      border-bottom: 1px solid transparent;
      color: var(--text);
      font-family: var(--font-b);
      font-size: 13px;
      font-weight: 500;
      outline: none;
      padding: 2px 0;
      transition: border-color 0.15s;
    }
    #session-name::placeholder { color: var(--text3); }
    #session-name:focus { border-bottom-color: var(--accent); }

    .session-spacer { flex: 1; }

    #breadcrumb {
      font-family: var(--font-m);
      font-size: 11px;
      color: var(--text3);
    }

    /* ── Content host ───────────────────────────────── */
    .content-host {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* ── Home dashboard ─────────────────────────────── */
    #home-dashboard {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 36px 40px 48px;
    }

    .home-greeting {
      font-family: var(--font-d);
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .home-sub {
      font-size: 13px;
      color: var(--text3);
      margin-bottom: 28px;
    }

    .home-section-label {
      font-family: var(--font-m);
      font-size: 10px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 10px;
    }

    .recent-strip {
      display: flex;
      gap: 7px;
      margin-bottom: 32px;
      flex-wrap: wrap;
      min-height: 30px;
    }

    .recent-pill {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      cursor: pointer;
      font-family: var(--font-b);
      transition: color 0.1s, border-color 0.1s, background 0.1s;
    }
    .recent-pill:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 18px 16px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .app-card:hover {
      border-color: rgba(184,240,51,0.35);
      background: var(--accent-dim);
    }

    .app-card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .app-card-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .app-card:hover .app-card-icon {
      background: rgba(184,240,51,0.12);
      border-color: rgba(184,240,51,0.3);
    }

    .app-card-group {
      font-family: var(--font-m);
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text3);
    }

    .app-card-name {
      font-family: var(--font-d);
      font-size: 13.5px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.1px;
    }

    .app-card-desc {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.5;
    }

    /* ── iframe ─────────────────────────────────────── */
    #app-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo" onclick="goHome()" title="Home">
      <div class="sidebar-logo-mark">TH</div>
      <div class="sidebar-logo-text">Thinking Hub</div>
    </div>

    <div class="sidebar-nav" id="sidebar-nav"></div>

    <div class="sidebar-footer">
      Local &middot; Offline<br>Files stay yours
    </div>
  </nav>

  <!-- Main area -->
  <div class="main-area">

    <!-- Session bar -->
    <div class="session-bar">
      <span class="session-label">Session</span>
      <input id="session-name" type="text" placeholder="Name this session…" autocomplete="off" spellcheck="false">
      <div class="session-spacer"></div>
      <span id="breadcrumb"></span>
    </div>

    <!-- Content host -->
    <div class="content-host">

      <!-- Home dashboard -->
      <div id="home-dashboard">
        <div class="home-greeting" id="greeting">Good morning.</div>
        <div class="home-sub">What are we working on?</div>

        <div class="home-section-label" id="recent-label" style="display:none">Recent</div>
        <div class="recent-strip" id="recent-strip"></div>

        <div class="home-section-label">Tools</div>
        <div class="app-grid" id="app-grid"></div>
      </div>

      <!-- App iframe -->
      <iframe id="app-frame" src="about:blank" allowfullscreen></iframe>
    </div>
  </div>

<script>
// ── App registry ──────────────────────────────────────────────────────────────

const APPS = [
  {
    id:    'project-hub',
    label: 'Project Hub',
    group: 'PLAN',
    icon:  '◈',
    file:  'project-hub.html',
    desc:  'Track milestones, tasks and workstreams across a project'
  },
  {
    id:    'task-explorer',
    label: 'Task Explorer',
    group: 'PLAN',
    icon:  '≋',
    file:  'task-explorer.html',
    desc:  'Import and explore work items across streams'
  },
  {
    id:    'idea-swiper',
    label: 'Idea Swiper',
    group: 'THINK',
    icon:  '⟳',
    file:  'idea-swiper.html',
    desc:  'Rapid triage — keep, park, or discard ideas'
  },
  {
    id:    'kmqt-board',
    label: 'KMQT Board',
    group: 'THINK',
    icon:  '⊞',
    file:  'kmqt-board.html',
    desc:  'Known / Messy / Questions / Thinking structured board'
  },
  {
    id:    'decision-log',
    label: 'Decision Log',
    group: 'DECIDE',
    icon:  '◎',
    file:  'decision-log.html',
    desc:  'Persistent log of decisions, rationale and outcomes'
  },
  {
    id:    'decision-workspace',
    label: 'Decision Workspace',
    group: 'DECIDE',
    icon:  '⊡',
    file:  'decision-workspace.html',
    desc:  'Problem framing, decision canvas and option mapping'
  },
  {
    id:    'alignment',
    label: 'Alignment',
    group: 'DECIDE',
    icon:  '◉',
    file:  'alignment.html',
    desc:  'Three-party stakeholder consensus voting and analysis'
  }
];

// ── Session state ─────────────────────────────────────────────────────────────

const SESSION_KEY = 'hub-session-v1';

function loadSession() {
  try {
    return JSON.parse(localStorage.getItem(SESSION_KEY)) || { sessionName: '', recentApps: [] };
  } catch {
    return { sessionName: '', recentApps: [] };
  }
}

function saveSession(patch) {
  const s = loadSession();
  Object.assign(s, patch);
  localStorage.setItem(SESSION_KEY, JSON.stringify(s));
}

// ── Sidebar ───────────────────────────────────────────────────────────────────

function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';

  const groups = [...new Set(APPS.map(a => a.group))];
  groups.forEach(group => {
    const appsInGroup = APPS.filter(a => a.group === group);
    const groupEl = document.createElement('div');
    groupEl.className = 'nav-group';
    groupEl.innerHTML = `<div class="nav-group-label">${group}</div>`;

    appsInGroup.forEach(app => {
      const btn = document.createElement('button');
      btn.className = 'nav-item';
      btn.dataset.app = app.id;
      btn.innerHTML = `<span class="nav-icon">${app.icon}</span>${app.label}`;
      btn.addEventListener('click', () => openApp(app.id));
      groupEl.appendChild(btn);
    });

    nav.appendChild(groupEl);
  });
}

function setActiveNav(id) {
  document.querySelectorAll('.nav-item').forEach(el =>
    el.classList.toggle('active', el.dataset.app === id));
}

// ── Home dashboard ────────────────────────────────────────────────────────────

function buildHomeDashboard() {
  const grid = document.getElementById('app-grid');
  grid.innerHTML = '';
  APPS.forEach(app => {
    const card = document.createElement('div');
    card.className = 'app-card';
    card.dataset.app = app.id;
    card.innerHTML = `
      <div class="app-card-top">
        <div class="app-card-icon">${app.icon}</div>
        <div>
          <div class="app-card-group">${app.group}</div>
          <div class="app-card-name">${app.label}</div>
        </div>
      </div>
      <div class="app-card-desc">${app.desc}</div>
    `;
    card.addEventListener('click', () => openApp(app.id));
    grid.appendChild(card);
  });
}

function refreshRecentStrip() {
  const { recentApps } = loadSession();
  const strip = document.getElementById('recent-strip');
  const label = document.getElementById('recent-label');
  strip.innerHTML = '';

  if (!recentApps.length) {
    label.style.display = 'none';
    return;
  }
  label.style.display = '';

  recentApps.forEach(id => {
    const app = APPS.find(a => a.id === id);
    if (!app) return;
    const btn = document.createElement('button');
    btn.className = 'recent-pill';
    btn.innerHTML = `${app.icon} ${app.label}`;
    btn.addEventListener('click', () => openApp(id));
    strip.appendChild(btn);
  });
}

// ── App loading ───────────────────────────────────────────────────────────────

let activeAppId = null;

function openApp(id) {
  const app = APPS.find(a => a.id === id);
  if (!app) return;

  // Update recent apps
  const s = loadSession();
  s.recentApps = [id, ...s.recentApps.filter(r => r !== id)].slice(0, 5);
  saveSession(s);

  // Load iframe
  const frame = document.getElementById('app-frame');
  frame.src = app.file;
  frame.style.display = 'block';

  // Send highlight once the tool finishes loading
  frame.onload = () => {
    if (_pendingHighlight) {
      frame.contentWindow.postMessage({ type: 'hub-highlight', itemId: _pendingHighlight }, '*');
      _pendingHighlight = null;
    }
  };

  // Hide dashboard
  document.getElementById('home-dashboard').style.display = 'none';

  // Update nav + breadcrumb
  setActiveNav(id);
  document.getElementById('breadcrumb').textContent = app.label;

  activeAppId = id;
}

function goHome() {
  const frame = document.getElementById('app-frame');
  frame.style.display = 'none';
  // Delay clearing src to avoid flash
  setTimeout(() => { if (frame.style.display === 'none') frame.src = 'about:blank'; }, 300);

  document.getElementById('home-dashboard').style.display = '';
  setActiveNav(null);
  document.getElementById('breadcrumb').textContent = '';
  refreshRecentStrip();
  activeAppId = null;
}

// ── Greeting ──────────────────────────────────────────────────────────────────

function setGreeting() {
  const h = new Date().getHours();
  const s = loadSession();
  const time = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
  const name = s.sessionName ? ` — ${s.sessionName}` : '.';
  document.getElementById('greeting').textContent = time + (s.sessionName ? name : '.');
}

// ── Session name ──────────────────────────────────────────────────────────────

function initSession() {
  const s = loadSession();
  document.getElementById('session-name').value = s.sessionName || '';
}

document.getElementById('session-name').addEventListener('input', function () {
  saveSession({ sessionName: this.value });
  setGreeting();
});

// ── Cross-tool navigation (postMessage from tools) ────────────────────────────

let _pendingHighlight = null;

window.addEventListener('message', e => {
  if (!e.data || e.data.type !== 'hub-navigate') return;
  const { tool, itemId } = e.data;
  if (!tool) return;
  _pendingHighlight = itemId || null;
  openApp(tool);
});

// ── Keyboard shortcut (Escape → home) ────────────────────────────────────────

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && activeAppId && document.activeElement.tagName !== 'INPUT') {
    goHome();
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────

initSession();
buildSidebar();
buildHomeDashboard();
refreshRecentStrip();
setGreeting();
</script>
</body>
</html>
