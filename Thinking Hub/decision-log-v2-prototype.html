<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Decision Log v2 — System of Record</title>
<style>
 body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0f0f11;color:#f0efe8;height:100vh;display:flex;flex-direction:column}
 header{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.08);font-weight:800}
 header span{color:#7c6af5}
 .main{flex:1;display:flex;overflow:hidden}
 .left{width:360px;border-right:1px solid rgba(255,255,255,.08);padding:12px;display:flex;flex-direction:column;gap:10px}
 .right{flex:1;padding:14px;overflow:auto}
 .label{font-size:11px;font-weight:800;letter-spacing:1px;color:#b7b6c3;text-transform:uppercase}
 input,textarea{background:#1a1a1f;border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#f0efe8;padding:8px;font-size:13px;width:100%}
 textarea{min-height:80px;resize:vertical}
 .tabs{display:flex;gap:6px;margin-bottom:10px}
 .tab{padding:6px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.12);font-size:12px;cursor:pointer;color:#b7b6c3}
 .tab.active{background:rgba(124,106,245,.18);color:#7c6af5;border-color:rgba(124,106,245,.4)}
 .section{display:none}
 .section.active{display:block}
 button{border:none;border-radius:10px;padding:8px 12px;font-weight:800;cursor:pointer;background:#7c6af5;color:#fff}
 .card{background:#1a1a1f;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px;line-height:1.55}
</style>
</head>
<body>
<header>decision<span>log</span> v2 — System of Record</header>
<div class="main">
 <div class="left">
  <div class="label">Decision Title</div>
  <input id="title" placeholder="Short decision title" />
  <div class="label">Summary</div>
  <textarea id="summary" placeholder="What was decided?" ></textarea>
  <button onclick="save()">Save Decision</button>
 </div>
 <div class="right">
  <div class="tabs">
   <div class="tab active" data-tab="problem">ProblemLens</div>
   <div class="tab" data-tab="options">OptionMap</div>
   <div class="tab" data-tab="canvas">Decision Canvas</div>
  </div>

  <div class="section active" id="problem">
   <div class="card">
    <div class="label">Problem to Solve</div>
    <textarea></textarea>
    <div class="label">Why Now</div>
    <textarea></textarea>
    <div class="label">Constraints</div>
    <textarea></textarea>
   </div>
  </div>

  <div class="section" id="options">
   <div class="card">
    <div class="label">Options</div>
    <textarea placeholder="Option / Upside / Downside"></textarea>
   </div>
  </div>

  <div class="section" id="canvas">
   <div class="card">
    <div class="label">Decision Question</div>
    <textarea></textarea>
    <div class="label">Next Action</div>
    <textarea></textarea>
   </div>
  </div>
 </div>
</div>
<script>
 function save(){alert('Saved (prototype)');}
 document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{
   document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
   document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));
   t.classList.add('active');
   document.getElementById(t.dataset.tab).classList.add('active');
  }
 });
</script>
</body>
</html>
