<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Log</title>
  <script src="hub-storage.js"></script>
  <script src="hub-links.js"></script>
  <script src="hub-data.js"></script>
  <script src="hub-bootstrap.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow: hidden; }
    body { display: flex; }

    /* ── Layout ── */
    .sidebar {
      width: 280px; min-width: 280px; height: 100vh;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-logo {
      height: 54px; display: flex; align-items: center; gap: 9px;
      padding: 0 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .logo-mark {
      width: 26px; height: 26px; border-radius: 7px; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: #111; font-family: var(--font-display);
    }
    .logo-text { font-family: var(--font-display); font-size: 13.5px; font-weight: 800; }

    .main {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Streak bar ── */
    .streak-bar {
      height: 54px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 20px; padding: 0 24px; flex-shrink: 0;
    }
    .streak-stat {
      display: flex; align-items: center; gap: 7px;
    }
    .streak-num {
      font-family: var(--font-display); font-size: 22px; font-weight: 800; color: var(--accent);
      line-height: 1;
    }
    .streak-label { font-size: 12px; color: var(--text3); }
    .streak-divider { width: 1px; height: 24px; background: var(--border); }

    /* ── Content area ── */
    .content {
      flex: 1; display: flex; overflow: hidden;
    }

    /* ── Heatmap panel ── */
    .heatmap-panel {
      width: 320px; min-width: 320px; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 20px; overflow-y: auto; gap: 20px;
    }
    .heatmap-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text3);
    }
    .heatmap-grid {
      display: flex; flex-direction: column; gap: 3px;
    }
    .heatmap-months {
      display: flex; gap: 3px; margin-bottom: 2px; padding-left: 18px;
    }
    .heatmap-month-label {
      font-size: 9px; color: var(--text3); font-family: var(--font-mono);
      flex-shrink: 0;
    }
    .heatmap-row {
      display: flex; align-items: center; gap: 3px;
    }
    .heatmap-day-label {
      font-size: 9px; color: var(--text3); font-family: var(--font-mono);
      width: 14px; text-align: right; flex-shrink: 0;
    }
    .heatmap-cell {
      width: 13px; height: 13px; border-radius: 2px;
      background: var(--surface2); cursor: pointer;
      transition: transform 0.1s; position: relative; flex-shrink: 0;
    }
    .heatmap-cell:hover { transform: scale(1.3); }
    .heatmap-cell.today { outline: 2px solid var(--accent); outline-offset: 1px; }
    .heatmap-cell[data-mood="1"] { background: #6366f1; opacity: 0.3; }
    .heatmap-cell[data-mood="2"] { background: #6366f1; opacity: 0.5; }
    .heatmap-cell[data-mood="3"] { background: var(--accent); opacity: 0.55; }
    .heatmap-cell[data-mood="4"] { background: var(--accent); opacity: 0.8; }
    .heatmap-cell[data-mood="5"] { background: var(--accent); opacity: 1; }
    [data-theme="light"] .heatmap-cell[data-mood="1"] { background: #818cf8; }
    [data-theme="light"] .heatmap-cell[data-mood="2"] { background: #6366f1; }
    [data-theme="light"] .heatmap-cell[data-mood="3"] { background: var(--accent); opacity: 0.6; }
    [data-theme="light"] .heatmap-cell[data-mood="4"] { background: var(--accent); opacity: 0.85; }
    [data-theme="light"] .heatmap-cell[data-mood="5"] { background: var(--accent); }

    .heatmap-legend {
      display: flex; align-items: center; gap: 6px; margin-top: 4px;
    }
    .heatmap-legend span { font-size: 10px; color: var(--text3); }
    .legend-cell {
      width: 11px; height: 11px; border-radius: 2px;
    }

    /* ── Entry list (sidebar) ── */
    .entry-list { display: flex; flex-direction: column; gap: 2px; flex: 1; overflow-y: auto; }
    .entry-list-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text3); flex-shrink: 0;
    }
    .entry-item {
      padding: 8px 10px; border-radius: var(--r-sm); cursor: pointer;
      transition: background 0.12s; border: 1px solid transparent; display: flex; align-items: center; gap: 8px;
    }
    .entry-item:hover { background: var(--surface2); }
    .entry-item.active { background: var(--accent-dim); border-color: var(--accent-glow); }
    .entry-mood-dot {
      font-size: 14px; flex-shrink: 0;
    }
    .entry-item-right { flex: 1; min-width: 0; }
    .entry-item-date { font-size: 11px; font-family: var(--font-mono); color: var(--text3); }
    .entry-item-preview { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Editor panel ── */
    .editor-panel {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    .editor-header {
      padding: 20px 24px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
      display: flex; align-items: flex-start; gap: 16px;
    }
    .editor-date {
      font-family: var(--font-display); font-size: 20px; font-weight: 800; flex: 1;
    }
    .editor-date-sub { font-size: 12px; color: var(--text3); font-family: var(--font-body); margin-top: 2px; }

    /* ── Mood picker ── */
    .mood-picker { display: flex; gap: 6px; flex-shrink: 0; }
    .mood-btn {
      width: 36px; height: 36px; border-radius: 8px; border: 2px solid transparent;
      background: var(--surface2); cursor: pointer; font-size: 18px; display: flex;
      align-items: center; justify-content: center; transition: all 0.12s;
    }
    .mood-btn:hover { background: var(--surface3); transform: scale(1.1); }
    .mood-btn.active { border-color: var(--accent); background: var(--accent-dim); }

    /* ── Textarea ── */
    .editor-body { flex: 1; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; overflow: hidden; }
    .editor-prompt {
      font-size: 12px; color: var(--text3); font-style: italic;
    }
    .log-textarea {
      flex: 1; background: transparent; border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px 16px; color: var(--text);
      font-family: var(--font-mono); font-size: 13px; line-height: 1.7;
      resize: none; outline: none; transition: border-color 0.15s;
    }
    .log-textarea:focus { border-color: var(--accent); }
    .log-textarea::placeholder { color: var(--text3); }

    /* ── Save bar ── */
    .save-bar {
      padding: 12px 24px; border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .save-status { font-size: 11px; color: var(--text3); flex: 1; }
    .save-status.saved { color: var(--accent-like); }

    /* ── Nav in sidebar ── */
    .sidebar-inner { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .new-entry-btn {
      width: 100%; padding: 8px; border-radius: var(--r-sm); border: 1px dashed var(--border);
      background: transparent; color: var(--text3); font-size: 12px; cursor: pointer;
      transition: all 0.12s; display: flex; align-items: center; justify-content: center; gap: 6px;
      font-family: var(--font-body);
    }
    .new-entry-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    /* ── Tooltip for heatmap ── */
    .heatmap-tooltip {
      position: fixed; pointer-events: none; z-index: 900;
      background: var(--surface3); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 5px 9px; font-size: 11px; color: var(--text2);
      font-family: var(--font-mono); white-space: nowrap; display: none;
      box-shadow: 0 4px 12px rgba(0,0,0,.3);
    }
  </style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">DL</div>
    <div class="logo-text">Daily Log</div>
  </div>
  <div class="sidebar-inner">
    <button class="new-entry-btn" onclick="openToday()">+ Today's entry</button>
    <div class="entry-list-title">Recent entries</div>
    <div class="entry-list" id="entry-list"></div>
  </div>
</div>

<div class="main">
  <!-- Streak bar -->
  <div class="streak-bar">
    <div class="streak-stat">
      <div class="streak-num" id="streak-count">0</div>
      <div class="streak-label">day streak 🔥</div>
    </div>
    <div class="streak-divider"></div>
    <div class="streak-stat">
      <div class="streak-num" id="total-count">0</div>
      <div class="streak-label">total entries</div>
    </div>
    <div class="streak-divider"></div>
    <div class="streak-stat">
      <div class="streak-num" id="avg-mood">—</div>
      <div class="streak-label">avg mood</div>
    </div>
  </div>

  <div class="content">
    <!-- Heatmap panel -->
    <div class="heatmap-panel">
      <div class="heatmap-title">Mood calendar · last 16 weeks</div>
      <div id="heatmap-wrap"></div>
      <div class="heatmap-legend">
        <span>Less</span>
        <div class="legend-cell" style="background:var(--surface2)"></div>
        <div class="legend-cell" style="background:#6366f1;opacity:.3"></div>
        <div class="legend-cell" style="background:var(--accent);opacity:.55"></div>
        <div class="legend-cell" style="background:var(--accent);opacity:.8"></div>
        <div class="legend-cell" style="background:var(--accent)"></div>
        <span>More</span>
      </div>
    </div>

    <!-- Editor panel -->
    <div class="editor-panel">
      <div class="editor-header" id="editor-header">
        <div>
          <div class="editor-date" id="editor-date">Today</div>
          <div class="editor-date-sub" id="editor-date-sub"></div>
        </div>
        <div class="mood-picker" id="mood-picker">
          <button class="mood-btn" data-mood="1" title="Rough" onclick="setMood(1)">😴</button>
          <button class="mood-btn" data-mood="2" title="Okay" onclick="setMood(2)">😐</button>
          <button class="mood-btn" data-mood="3" title="Good" onclick="setMood(3)">🙂</button>
          <button class="mood-btn" data-mood="4" title="Great" onclick="setMood(4)">😊</button>
          <button class="mood-btn" data-mood="5" title="Amazing" onclick="setMood(5)">🔥</button>
        </div>
      </div>
      <div class="editor-body">
        <div class="editor-prompt" id="editor-prompt">What happened today? What did you learn? What are you grateful for?</div>
        <textarea class="log-textarea" id="log-textarea" placeholder="Start writing…" oninput="onEdit()"></textarea>
      </div>
      <div class="save-bar">
        <div class="save-status" id="save-status"></div>
        <button class="btn btn-primary" onclick="saveEntry()">Save entry</button>
        <button class="btn btn-ghost" onclick="deleteEntry()" id="delete-btn" style="display:none">Delete</button>
      </div>
    </div>
  </div>
</div>

<div class="heatmap-tooltip" id="hm-tooltip"></div>

<script>
  const STORAGE_KEY = 'log-hub-v1';
  const MOODS = ['', '😴', '😐', '🙂', '😊', '🔥'];
  const MOOD_LABELS = ['', 'Rough', 'Okay', 'Good', 'Great', 'Amazing'];

  let data = { entries: {} }; // keyed by 'YYYY-MM-DD'
  let activeDate = todayStr();
  let saveTimer = null;

  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  function load() {
    const raw = HubStorage.get(STORAGE_KEY);
    data = raw || { entries: {} };
    if (!data.entries) data.entries = {};
  }

  function save() {
    HubStorage.set(STORAGE_KEY, data);
  }

  function getEntry(date) {
    return data.entries[date] || { mood: 0, text: '' };
  }

  // ── Render heatmap ──────────────────────────────────────────────────────────

  function buildHeatmap() {
    const wrap = document.getElementById('heatmap-wrap');
    const today = new Date();
    const WEEKS = 16;
    const TOTAL_DAYS = WEEKS * 7;

    // Build list of dates, starting from Monday WEEKS weeks ago
    const startDay = new Date(today);
    startDay.setDate(startDay.getDate() - TOTAL_DAYS + 1);
    // Adjust to Monday
    const dow = startDay.getDay(); // 0=Sun
    startDay.setDate(startDay.getDate() - ((dow + 6) % 7));

    const days = [];
    for (let i = 0; i < WEEKS * 7; i++) {
      const d = new Date(startDay);
      d.setDate(d.getDate() + i);
      days.push(d.toISOString().slice(0, 10));
    }

    // Build week columns: days[0..6], days[7..13], ...
    const todayISO = today.toISOString().slice(0, 10);

    // Rows: Mon..Sun (0=Mon)
    const DAY_LABELS = ['M', '', 'W', '', 'F', '', 'S'];

    let html = '<div class="heatmap-grid">';

    for (let row = 0; row < 7; row++) {
      html += `<div class="heatmap-row"><div class="heatmap-day-label">${DAY_LABELS[row]}</div>`;
      for (let col = 0; col < WEEKS; col++) {
        const idx = col * 7 + row;
        const dateStr = days[idx];
        const e = data.entries[dateStr];
        const mood = e ? (e.mood || 0) : 0;
        const isToday = dateStr === todayISO;
        const future = dateStr > todayISO;
        const moodAttr = mood ? ` data-mood="${mood}"` : '';
        const todayClass = isToday ? ' today' : '';
        const opacityStyle = future ? ' style="opacity:0.25"' : '';
        html += `<div class="heatmap-cell${todayClass}"${moodAttr}${opacityStyle} data-date="${dateStr}" onclick="openDate('${dateStr}')" onmouseenter="showTooltip(event,'${dateStr}')" onmouseleave="hideTooltip()"></div>`;
      }
      html += '</div>';
    }
    html += '</div>';

    wrap.innerHTML = html;
  }

  function showTooltip(e, dateStr) {
    const tip = document.getElementById('hm-tooltip');
    const entry = data.entries[dateStr];
    const mood = entry ? (entry.mood || 0) : 0;
    const moodLabel = mood ? ` · ${MOODS[mood]} ${MOOD_LABELS[mood]}` : '';
    const text = entry && entry.text ? ` · "${entry.text.slice(0, 30)}${entry.text.length > 30 ? '…' : ''}"` : '';
    tip.textContent = dateStr + moodLabel + text;
    tip.style.display = 'block';
    tip.style.left = (e.clientX + 12) + 'px';
    tip.style.top = (e.clientY - 28) + 'px';
  }
  function hideTooltip() {
    document.getElementById('hm-tooltip').style.display = 'none';
  }

  // ── Entry list ──────────────────────────────────────────────────────────────

  function renderEntryList() {
    const el = document.getElementById('entry-list');
    const dates = Object.keys(data.entries).sort((a, b) => b.localeCompare(a));
    if (!dates.length) {
      el.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:8px 4px">No entries yet</div>';
      return;
    }
    el.innerHTML = dates.slice(0, 60).map(d => {
      const e = data.entries[d];
      const mood = e.mood ? MOODS[e.mood] : '·';
      const preview = (e.text || '').slice(0, 40);
      const active = d === activeDate ? ' active' : '';
      return `<div class="entry-item${active}" onclick="openDate('${d}')">
        <div class="entry-mood-dot">${mood}</div>
        <div class="entry-item-right">
          <div class="entry-item-date">${d}</div>
          <div class="entry-item-preview">${preview || 'No text'}</div>
        </div>
      </div>`;
    }).join('');
  }

  // ── Editor ──────────────────────────────────────────────────────────────────

  function openDate(dateStr) {
    activeDate = dateStr;
    const e = getEntry(dateStr);
    const todayISO = todayStr();

    const dateObj = new Date(dateStr + 'T12:00:00');
    const dateLabel = dateObj.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

    document.getElementById('editor-date').textContent = dateStr === todayISO ? 'Today' : dateLabel;
    document.getElementById('editor-date-sub').textContent = dateStr === todayISO ? dateLabel : '';
    document.getElementById('log-textarea').value = e.text || '';

    // Mood buttons
    document.querySelectorAll('.mood-btn').forEach(btn => {
      btn.classList.toggle('active', parseInt(btn.dataset.mood) === e.mood);
    });

    document.getElementById('save-status').textContent = '';
    document.getElementById('save-status').className = 'save-status';

    const hasEntry = !!data.entries[dateStr];
    document.getElementById('delete-btn').style.display = hasEntry ? '' : 'none';

    document.getElementById('log-textarea').focus();
    renderEntryList();
  }

  function openToday() {
    openDate(todayStr());
  }

  function setMood(n) {
    document.querySelectorAll('.mood-btn').forEach(btn => {
      btn.classList.toggle('active', parseInt(btn.dataset.mood) === n);
    });
    // Update in data immediately for live heatmap feel
    if (!data.entries[activeDate]) data.entries[activeDate] = { mood: 0, text: '' };
    data.entries[activeDate].mood = n;
    autosave();
  }

  function onEdit() {
    document.getElementById('save-status').textContent = 'Unsaved changes…';
    document.getElementById('save-status').className = 'save-status';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveEntry, 2000);
  }

  function saveEntry() {
    clearTimeout(saveTimer);
    const text = document.getElementById('log-textarea').value.trim();
    const activeMood = parseInt(document.querySelector('.mood-btn.active')?.dataset.mood || '0');

    if (!text && !activeMood) {
      // Nothing to save; if exists, delete
      return;
    }

    if (!data.entries[activeDate]) data.entries[activeDate] = {};
    data.entries[activeDate].mood = activeMood;
    data.entries[activeDate].text = text;
    data.entries[activeDate].updatedAt = new Date().toISOString();

    save();
    renderAll();

    document.getElementById('save-status').textContent = 'Saved ✓';
    document.getElementById('save-status').className = 'save-status saved';
    document.getElementById('delete-btn').style.display = '';
  }

  function autosave() {
    save();
    renderAll();
  }

  function deleteEntry() {
    if (!data.entries[activeDate]) return;
    if (!confirm('Delete this entry?')) return;
    delete data.entries[activeDate];
    save();
    renderAll();
    openDate(activeDate);
  }

  // ── Stats ───────────────────────────────────────────────────────────────────

  function computeStats() {
    const dates = Object.keys(data.entries).filter(d => data.entries[d].text || data.entries[d].mood).sort();
    const total = dates.length;

    // Streak: consecutive days ending today or yesterday
    let streak = 0;
    const today = new Date();
    let check = new Date(today);
    while (true) {
      const ds = check.toISOString().slice(0, 10);
      if (data.entries[ds] && (data.entries[ds].text || data.entries[ds].mood)) {
        streak++;
        check.setDate(check.getDate() - 1);
      } else {
        // Allow gap for today (might not have written yet)
        if (streak === 0) {
          check.setDate(check.getDate() - 1);
          const ds2 = check.toISOString().slice(0, 10);
          if (data.entries[ds2] && (data.entries[ds2].text || data.entries[ds2].mood)) {
            streak++;
            check.setDate(check.getDate() - 1);
            continue;
          }
        }
        break;
      }
    }

    const moods = dates.map(d => data.entries[d].mood).filter(Boolean);
    const avgMood = moods.length ? (moods.reduce((a, b) => a + b, 0) / moods.length) : 0;

    document.getElementById('streak-count').textContent = streak;
    document.getElementById('total-count').textContent = total;
    document.getElementById('avg-mood').textContent = avgMood ? MOODS[Math.round(avgMood)] : '—';
  }

  // ── Render all ──────────────────────────────────────────────────────────────

  function renderAll() {
    buildHeatmap();
    renderEntryList();
    computeStats();
  }

  // ── Boot ────────────────────────────────────────────────────────────────────

  document.addEventListener('DOMContentLoaded', () => {
    load();
    renderAll();
    openDate(todayStr());
    HubBootstrap.start('log-hub');
  });
</script>
</body>
</html>
