<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decision Hub</title>
  <script src="hub-storage.js"></script>
  <script src="hub-links.js"></script>
  <script src="hub-data.js"></script>
  <link rel="stylesheet" href="theme.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { height: 100vh; display: flex; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-b); }

    /* ── SIDEBAR ─────────────────────────────────────────────── */
    .sidebar { width: 260px; min-width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; }
    .sidebar-logo { padding: 18px 16px 14px; display: flex; align-items: center; gap: 9px; border-bottom: 1px solid var(--border); }
    .logo-mark { width: 28px; height: 28px; border-radius: 7px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 13px; color: #0b0b0d; font-weight: 700; flex-shrink: 0; }
    .logo-text { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; font-family: var(--font-d); }
    
    .sidebar-actions { padding: 12px; border-bottom: 1px solid var(--border); }
    .btn-create { width: 100%; padding: 8px; background: var(--accent); color: #111; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
    .btn-create:hover { opacity: 0.85; }

    .sidebar-nav { flex: 1; overflow-y: auto; padding: 10px 8px; }
    .nav-group { margin-bottom: 16px; }
    .nav-group-label { font-size: 10px; font-family: var(--font-mono); color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; padding: 0 8px; margin-bottom: 4px; display: flex; justify-content: space-between;}
    .nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text2); transition: all 0.12s; border-radius: 8px; margin-bottom: 2px; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--accent-dim); color: var(--accent); }
    .nav-icon { width: 16px; text-align: center; font-size: 12px; opacity: 0.7; }
    .nav-badge { margin-left: auto; font-family: var(--font-mono); font-size: 10px; color: var(--text3); background: var(--surface3); padding: 1px 6px; border-radius: 20px; }

    /* ── MAIN ────────────────────────────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .topbar { height: 52px; display: flex; align-items: center; padding: 0 20px; gap: 10px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    .topbar-title { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; font-family: var(--font-d); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .view-toggle { display: flex; gap: 2px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
    .view-toggle-btn { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; color: var(--text3); transition: all 0.12s; border: none; background: transparent; }
    .view-toggle-btn.active { background: var(--surface3); color: var(--text); }
    
    .content { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

    .empty-state { text-align: center; padding: 48px 24px; color: var(--text3); margin: auto; }
    .empty-state .e-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.5; }
    .empty-state .e-title { font-size: 14px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
    
    /* ── FORMS ────────────────────────────────────────────────── */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 11px; color: var(--text3); margin-bottom: 6px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 1px; }
    .form-input, .form-textarea, .form-select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; font-family: var(--font-b); padding: 9px 12px; outline: none; transition: border-color 0.15s; }
    .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }

    /* ── CARDS & SECTIONS ────────────────────────────────────── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 12px; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
    .card-title { font-weight: 700; font-size: 14px; }
    
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } }
    
    /* ── OPTION MAP TABLE ────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid var(--surface3); padding: 9px 10px; text-align: left; font-size: 13px; }
    th { background: var(--surface); color: var(--text3); font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; font-weight: 500; }
    td { background: var(--surface2); }
    td input, td select { width: 100%; background: transparent; border: none; color: var(--text); font-size: 13px; font-family: var(--font-b); outline: none; }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .btn-danger { background: rgba(240,67,107,0.1); color: var(--accent3); border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn-danger:hover { background: rgba(240,67,107,0.2); }

    /* ── BADGES ──────────────────────────────────────────────── */
    .badge { padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .b-decision { background: rgba(184,240,51,0.1); color: var(--accent); }
    .b-note { background: rgba(100,100,140,0.15); color: #9999bb; }
    .b-risk { background: rgba(240,176,64,0.15); color: var(--amber); }
    .b-open { background: rgba(240,67,107,0.15); color: var(--accent3); }
    
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">D</div>
      <span class="logo-text">Decision Hub</span>
    </div>
    <div class="sidebar-actions">
      <button class="btn-create" onclick="createNew()">+ New Decision</button>
    </div>
    <div class="sidebar-nav" id="sidebar-nav">
      <!-- Populated dynamically -->
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Select an item</div>
      
      <div class="view-toggle" id="view-toggle" style="display:none">
        <button class="view-toggle-btn active" id="tab-log" onclick="switchTab('log')">Log & Summary</button>
        <button class="view-toggle-btn" id="tab-workspace" onclick="switchTab('workspace')">Workspace</button>
        <button class="view-toggle-btn" id="tab-alignment" onclick="switchTab('alignment')">Alignment</button>
      </div>

      <button class="btn-ghost" id="btn-save" style="display:none" onclick="saveCurrent()">Save Changes</button>
      <button class="btn-danger" id="btn-delete" style="display:none" onclick="deleteCurrent()">Delete</button>
    </div>
    
    <div class="content" id="main-content">
      <div class="empty-state">
        <div class="e-icon">◎</div>
        <div class="e-title">Decision Hub</div>
        <div class="e-sub">Select an item from the sidebar or create a new one.</div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'decision-hub-v1';
    
    let decisions = [];
    let currentId = null;
    let currentTab = 'log';

    const PROBLEM_FIELDS = [
      { id: 'prob1', label: 'Problem to Be Solved', placeholder: 'What problem are we actually trying to solve?' },
      { id: 'prob2', label: 'Who Is Affected', placeholder: 'Who experiences the pain?' },
      { id: 'prob3', label: 'Constraints & Assumptions', placeholder: 'Budget, schedule, regulation, fixed decisions' }
    ];

    const CANVAS_FIELDS = [
      { id: 'can1', label: 'Decision Question', placeholder: 'What decision are we making?' },
      { id: 'can2', label: 'What We Know', placeholder: 'Facts, data, assumptions' },
      { id: 'can3', label: 'Decision & Next Action', placeholder: 'Chosen option and immediate next step' }
    ];

    function loadData() {
      try {
        decisions = HubStorage.get(STORAGE_KEY) || [];
      } catch (e) {
        decisions = [];
      }
      if (!Array.isArray(decisions)) decisions = [];
    }

    function saveData() {
      HubStorage.set(STORAGE_KEY, decisions);
    }

    // ─── INITIALIZATION ──────────────────────────────────────────────────────────
    HubData.init('decision-hub');
    loadData();
    renderSidebar();

    function getProjectName(pid) {
      if (!pid) return 'No Project';
      const p = HubData.getProject?.(pid);
      return p ? p.name : 'Unknown Project';
    }

    // ─── SIDEBAR RENDERING ───────────────────────────────────────────────────────
    function renderSidebar() {
      const nav = document.getElementById('sidebar-nav');
      nav.innerHTML = '';
      
      const byProject = {};
      decisions.forEach(d => {
        const pid = d.projectId || 'none';
        if (!byProject[pid]) byProject[pid] = [];
        byProject[pid].push(d);
      });

      // Render groups
      for (const pid of Object.keys(byProject)) {
        const group = document.createElement('div');
        group.className = 'nav-group';
        
        const label = document.createElement('div');
        label.className = 'nav-group-label';
        label.innerHTML = `<span>${getProjectName(pid === 'none' ? null : pid)}</span> <span class="nav-badge">${byProject[pid].length}</span>`;
        group.appendChild(label);

        byProject[pid].forEach(d => {
          const item = document.createElement('div');
          item.className = 'nav-item' + (currentId === d.id ? ' active' : '');
          
          let icon = '◎';
          if(d.type === 'note') icon = '✎';
          if(d.type === 'risk') icon = '⚠';
          if(d.type === 'open') icon = '？';

          item.innerHTML = `<span class="nav-icon">${icon}</span> <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.title || 'Untitled'}</span>`;
          item.onclick = () => openDecision(d.id);
          group.appendChild(item);
        });
        
        nav.appendChild(group);
      }
      
      if (decisions.length === 0) {
        nav.innerHTML = `<div style="padding: 20px; text-align: center; color: var(--text3); font-size: 12px;">No items yet.</div>`;
      }
    }

    // ─── LOGIC ───────────────────────────────────────────────────────────────────
    function createNew() {
      const id = 'dh-' + Date.now().toString(36);
      const dec = {
        id,
        projectId: '',
        title: 'New Item',
        type: 'decision',
        confidence: 'medium',
        summary: '',
        reason: '',
        tags: '',
        links: '',
        problemLens: {},
        decisionCanvas: {},
        optionMap: [],
        alignment: []
      };
      decisions.push(dec);
      saveData();
      openDecision(id);
      renderSidebar();
    }

    function openDecision(id) {
      currentId = id;
      document.getElementById('view-toggle').style.display = 'flex';
      document.getElementById('btn-save').style.display = 'block';
      document.getElementById('btn-delete').style.display = 'block';
      renderSidebar();
      renderContent();
    }

    function switchTab(tab) {
      if (currentId) {
        // save current tab state before switching
        saveCurrent();
      }
      currentTab = tab;
      document.querySelectorAll('.view-toggle-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      renderContent();
    }

    function deleteCurrent() {
      if (!currentId) return;
      if (!confirm('Are you sure you want to delete this item?')) return;
      decisions = decisions.filter(d => d.id !== currentId);
      saveData();
      currentId = null;
      document.getElementById('view-toggle').style.display = 'none';
      document.getElementById('btn-save').style.display = 'none';
      document.getElementById('btn-delete').style.display = 'none';
      document.getElementById('topbar-title').innerText = 'Select an item';
      document.getElementById('main-content').innerHTML = `
        <div class="empty-state">
          <div class="e-icon">◎</div>
          <div class="e-title">Item Deleted</div>
        </div>
      `;
      renderSidebar();
    }

    function saveCurrent() {
      if (!currentId) return;
      const dec = decisions.find(d => d.id === currentId);
      if (!dec) return;

      if (currentTab === 'log') {
        dec.title = document.getElementById('i-title').value;
        dec.projectId = document.getElementById('i-project').value;
        dec.type = document.getElementById('i-type').value;
        dec.confidence = document.getElementById('i-conf').value;
        dec.summary = document.getElementById('i-summary').value;
        dec.reason = document.getElementById('i-reason').value;
        dec.tags = document.getElementById('i-tags').value;
      } 
      else if (currentTab === 'workspace') {
        PROBLEM_FIELDS.forEach(f => {
          dec.problemLens[f.id] = document.getElementById('pl-' + f.id)?.value || '';
        });
        CANVAS_FIELDS.forEach(f => {
          dec.decisionCanvas[f.id] = document.getElementById('dc-' + f.id)?.value || '';
        });
        
        // Option Map Save natively handled on input change 
      }
      
      saveData();
      renderSidebar();
      document.getElementById('topbar-title').innerText = dec.title || 'Untitled';
    }

    // ─── RENDERING CONTENT ───────────────────────────────────────────────────────
    function renderContent() {
      const dec = decisions.find(d => d.id === currentId);
      if (!dec) return;
      
      document.getElementById('topbar-title').innerText = dec.title || 'Untitled';
      const c = document.getElementById('main-content');
      c.innerHTML = '';

      if (currentTab === 'log') {
        const projOpts = HubData.getProjects().map(p => `<option value="${p.id}" ${dec.projectId===p.id?'selected':''}>${p.name}</option>`).join('');
        
        c.innerHTML = `
          <div class="card">
            <div class="form-row">
              <div class="form-group" style="flex:2">
                <label class="form-label">Title</label>
                <input class="form-input" id="i-title" value="${dec.title || ''}">
              </div>
              <div class="form-group">
                <label class="form-label">Project</label>
                <select class="form-select" id="i-project">
                  <option value="">— No Project —</option>
                  ${projOpts}
                </select>
              </div>
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Type</label>
                <select class="form-select" id="i-type">
                  <option value="decision" ${dec.type==='decision'?'selected':''}>Decision</option>
                  <option value="note" ${dec.type==='note'?'selected':''}>Note</option>
                  <option value="risk" ${dec.type==='risk'?'selected':''}>Risk</option>
                  <option value="open" ${dec.type==='open'?'selected':''}>Open Q</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Confidence</label>
                <select class="form-select" id="i-conf">
                  <option value="high" ${dec.confidence==='high'?'selected':''}>High</option>
                  <option value="medium" ${dec.confidence==='medium'?'selected':''}>Medium</option>
                  <option value="low" ${dec.confidence==='low'?'selected':''}>Low</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Tags</label>
                <input class="form-input" id="i-tags" value="${dec.tags || ''}" placeholder="Comma separated">
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Summary / Action</label>
              <textarea class="form-textarea" id="i-summary" style="min-height:100px">${dec.summary || ''}</textarea>
            </div>
            
            <div class="form-group">
              <label class="form-label">Reasoning & Evidence</label>
              <textarea class="form-textarea" id="i-reason" style="min-height:100px">${dec.reason || ''}</textarea>
            </div>
          </div>
        `;
      } 
      else if (currentTab === 'workspace') {
        const plHtml = PROBLEM_FIELDS.map(f => `
          <div class="form-group">
            <label class="form-label">${f.label}</label>
            <textarea class="form-textarea" id="pl-${f.id}" placeholder="${f.placeholder}">${dec.problemLens?.[f.id] || ''}</textarea>
          </div>
        `).join('');

        const dcHtml = CANVAS_FIELDS.map(f => `
          <div class="form-group">
            <label class="form-label">${f.label}</label>
            <textarea class="form-textarea" id="dc-${f.id}" placeholder="${f.placeholder}">${dec.decisionCanvas?.[f.id] || ''}</textarea>
          </div>
        `).join('');

        c.innerHTML = `
          <div class="grid-2">
            <div class="card">
              <div class="card-header"><div class="card-title">Problem Lens</div></div>
              ${plHtml}
            </div>
            <div class="card">
              <div class="card-header"><div class="card-title">Decision Canvas</div></div>
              ${dcHtml}
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-title">Option Map</div>
              <button class="btn-ghost" id="add-opt-btn">+ Add Option</button>
            </div>
            <table id="opt-table">
              <thead><tr><th>Option</th><th>Upside</th><th>Downside</th><th>Owner</th><th style="width:50px"></th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        `;
        
        document.getElementById('add-opt-btn').onclick = () => {
          dec.optionMap = dec.optionMap || [];
          dec.optionMap.push({option:'', upside:'', downside:'', owner:''});
          saveData();
          renderContent();
        };

        const tbody = c.querySelector('tbody');
        const opts = dec.optionMap || [];
        opts.forEach((opt, idx) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><input value="${opt.option}" onchange="updateOpt(${idx}, 'option', this.value)"></td>
            <td><input value="${opt.upside}" onchange="updateOpt(${idx}, 'upside', this.value)"></td>
            <td><input value="${opt.downside}" onchange="updateOpt(${idx}, 'downside', this.value)"></td>
            <td><input value="${opt.owner}" onchange="updateOpt(${idx}, 'owner', this.value)"></td>
            <td><button class="btn-danger" onclick="delOpt(${idx})">✕</button></td>
          `;
          tbody.appendChild(tr);
        });
      }
      else if (currentTab === 'alignment') {
        const votes = dec.alignment || [];
        const voteHtml = votes.length ? votes.map(v => `
          <div style="padding: 10px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between;">
            <div><strong>${v.name}</strong> <span style="font-size: 11px; color: var(--text3)">(${v.role})</span></div>
            <div>
              <span class="badge ${v.vote === 'approve' ? 'b-decision' : v.vote === 'concern' ? 'b-risk' : 'b-open'}">
                ${v.vote.toUpperCase()}
              </span>
            </div>
          </div>
        `).join('') : '<div class="empty-state"><div class="e-sub">No votes recorded yet.</div></div>';
        
        c.innerHTML = `
          <div class="card" style="max-width: 600px; margin: auto;">
            <div class="card-header"><div class="card-title">Team Alignment</div></div>
            <div style="margin-bottom: 20px;">
              ${voteHtml}
            </div>
            <div style="border-top: 1px solid var(--border); padding-top: 16px;">
              <div style="font-size: 13px; font-weight: 600; margin-bottom: 10px;">Cast your vote</div>
              <div class="form-row">
                <input class="form-input" id="v-name" placeholder="Your Name" style="width: 150px;">
                <select class="form-select" id="v-role" style="width: 150px;">
                  <option value="Lead">Lead</option>
                  <option value="Tech">Tech</option>
                  <option value="Design">Design</option>
                  <option value="Strategy">Strategy</option>
                </select>
                <select class="form-select" id="v-vote" style="width: 120px;">
                  <option value="approve">Approve</option>
                  <option value="concern">Concern</option>
                  <option value="block">Block</option>
                </select>
                <button class="btn-ghost" onclick="addVote()">Submit</button>
              </div>
            </div>
          </div>
        `;
      }
    }

    // Expose option helpers globally for inline onclick
    window.updateOpt = (idx, key, val) => {
      const dec = decisions.find(d => d.id === currentId);
      if (dec && dec.optionMap[idx]) {
        dec.optionMap[idx][key] = val;
        saveData();
      }
    };
    window.delOpt = (idx) => {
      const dec = decisions.find(d => d.id === currentId);
      if (dec) {
        dec.optionMap.splice(idx, 1);
        saveData();
        renderContent();
      }
    };
    window.addVote = () => {
      const dec = decisions.find(d => d.id === currentId);
      if (!dec) return;
      dec.alignment = dec.alignment || [];
      const name = document.getElementById('v-name').value || 'Anonymous';
      const role = document.getElementById('v-role').value;
      const vote = document.getElementById('v-vote').value;
      // Replace existing vote if same name
      const existing = dec.alignment.findIndex(v => v.name === name);
      if (existing >= 0) {
        dec.alignment[existing] = {name, role, vote};
      } else {
        dec.alignment.push({name, role, vote});
      }
      saveData();
      renderContent();
    };

    // Auto save on any input change within forms
    document.addEventListener('input', e => {
      if (e.target.matches('.form-input, .form-textarea, .form-select')) {
        saveCurrent();
      }
    });

  </script>
</body>
</html>
