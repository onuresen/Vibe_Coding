<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decision Hub</title>
  <script src="hub-storage.js"></script>
  <script src="hub-links.js"></script>
  <script src="hub-data.js"></script>
  <script src="hub-bootstrap.js"></script>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="theme.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      display: flex;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
    }

    /* ── SIDEBAR ─────────────────────────────────────────────── */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .sidebar-logo {
      padding: 18px 16px 14px;
      display: flex;
      align-items: center;
      gap: 9px;
      border-bottom: 1px solid var(--border);
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #0b0b0d;
      font-weight: 700;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      font-family: var(--font-display);
    }

    .sidebar-actions {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .btn-create {
      width: 100%;
      padding: 8px;
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-create:hover {
      opacity: 0.85;
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 10px 8px;
    }

    .nav-group {
      margin-bottom: 16px;
    }

    .nav-group-label {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text3);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 0 8px;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      transition: all 0.12s;
      border-radius: 8px;
      margin-bottom: 2px;
    }

    .nav-item:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .nav-item.active {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .nav-icon {
      width: 16px;
      text-align: center;
      font-size: 12px;
      opacity: 0.7;
    }

    .nav-badge {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text3);
      background: var(--surface3);
      padding: 1px 6px;
      border-radius: 20px;
    }

    /* ── MAIN ────────────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .topbar {
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
      font-family: var(--font-display);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .view-toggle {
      display: flex;
      gap: 2px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
    }

    .view-toggle-btn {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text3);
      transition: all 0.12s;
      border: none;
      background: transparent;
    }

    .view-toggle-btn.active {
      background: var(--surface3);
      color: var(--text);
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .empty-state .e-icon {
      font-size: 32px;
      margin-bottom: 10px;
      opacity: 0.5;
    }

    .empty-state .e-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 4px;
    }

    /* ── FORMS ────────────────────────────────────────────────── */
    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 6px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-row .form-group {
      flex: 1;
    }

    /* ── CARDS & SECTIONS ────────────────────────────────────── */

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .card-title {
      font-weight: 700;
      font-size: 14px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 800px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    /* ── Workspace progressive disclosure ───────────────────── */
    .ws-extra { display: none; }
    .ws-extra.open { display: block; }
    .ws-expand-btn {
      margin-top: 6px;
      background: none;
      border: none;
      color: var(--text3);
      font-size: 11.5px;
      font-family: var(--font-body);
      cursor: pointer;
      padding: 2px 0;
      transition: color 0.12s;
    }
    .ws-expand-btn:hover { color: var(--accent); }
    .ws-action-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }
    .ws-kmqt-btn {
      padding: 5px 12px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: var(--r-sm);
      color: var(--text3);
      font-size: 11.5px;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all 0.12s;
    }
    .ws-kmqt-btn:hover { color: var(--text); border-color: var(--accent); }

    /* ── OPTION MAP TABLE ────────────────────────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th,
    td {
      border: 1px solid var(--surface3);
      padding: 9px 10px;
      text-align: left;
      font-size: 13px;
    }

    th {
      background: var(--surface);
      color: var(--text3);
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 500;
    }

    td {
      background: var(--surface2);
    }

    td input,
    td select {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font-body);
      outline: none;
    }

    /* ── ALIGNMENT MATRIX ───────────────────────────────────── */
    .align-matrix {
      width: 100%;
      border-collapse: collapse;
      margin-top: 0;
    }

    .align-matrix th,
    .align-matrix td {
      border: 1px solid var(--surface3);
      padding: 8px 10px;
      font-size: 12px;
    }

    .align-matrix th {
      background: var(--surface);
      color: var(--text3);
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 500;
    }

    .align-matrix td {
      background: var(--surface2);
      vertical-align: middle;
    }

    .align-matrix td:first-child {
      color: var(--text);
      font-weight: 600;
      white-space: nowrap;
    }

    .align-matrix td:nth-child(2) {
      color: var(--text3);
      font-size: 11px;
      white-space: nowrap;
    }

    .vote-cell {
      text-align: center;
      cursor: pointer;
      user-select: none;
      min-width: 80px;
      font-size: 12px;
      font-weight: 600;
      transition: background 0.1s;
      border-radius: 4px;
    }

    .vote-cell:hover {
      background: var(--surface3);
    }

    .vote-cell[data-v="yes"] {
      color: var(--accent);
    }

    .vote-cell[data-v="maybe"] {
      color: #f0b040;
    }

    .vote-cell[data-v="no"] {
      color: #e8455a;
    }

    .score-row td {
      background: var(--surface);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
    }

    .score-cell {
      text-align: center;
    }

    .score-pos {
      color: var(--accent);
    }

    .score-neg {
      color: #e8455a;
    }

    .score-neu {
      color: var(--text3);
    }

    .align-hint {
      margin-top: 10px;
      font-size: 11px;
      color: var(--text3);
    }

    /* ── BADGES ──────────────────────────────────────────────── */
    .badge {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .b-decision {
      background: rgba(184, 240, 51, 0.1);
      color: var(--accent);
    }

    .b-note {
      background: rgba(100, 100, 140, 0.15);
      color: #9999bb;
    }

    .b-risk {
      background: rgba(240, 176, 64, 0.15);
      color: var(--amber);
    }

    .b-open {
      background: rgba(240, 67, 107, 0.15);
      color: var(--accent3);
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">D</div>
      <span class="logo-text">Decision Hub</span>
    </div>
    <div class="sidebar-actions">
      <button class="btn-create" onclick="createNew()">+ New Decision</button>
    </div>
    <div class="sidebar-nav" id="sidebar-nav">
      <!-- Populated dynamically -->
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Select an item</div>

      <div class="view-toggle" id="view-toggle" style="display:none">
        <button class="view-toggle-btn active" id="tab-log" onclick="switchTab('log')">Log & Summary</button>
        <button class="view-toggle-btn" id="tab-workspace" onclick="switchTab('workspace')">Workspace</button>
        <button class="view-toggle-btn" id="tab-alignment" onclick="switchTab('alignment')">Alignment</button>
      </div>

      <button class="btn-ghost" id="btn-save" style="display:none" onclick="saveCurrent()">Save Changes</button>
      <button class="btn-danger" id="btn-delete" style="display:none" onclick="deleteCurrent()">Delete</button>
    </div>

    <div class="content" id="main-content">
      <div class="empty-state">
        <div class="e-icon">◎</div>
        <div class="e-title">Decision Hub</div>
        <div class="e-sub">Select an item from the sidebar or create a new one.</div>
      </div>
    </div>
  </div>

  <script>
    function _esc(s) {
      return String(s || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    const STORAGE_KEY = 'decision-hub-v1';

    let decisions = [];
    let currentId = null;
    let currentTab = 'log';

    const PROBLEM_FIELDS = [
      { id: 'prob1', label: 'Problem to Be Solved', placeholder: 'What problem are we actually trying to solve?' },
      { id: 'prob2', label: 'Who Is Affected', placeholder: 'Who experiences the pain?' },
      { id: 'prob3', label: 'Constraints & Assumptions', placeholder: 'Budget, schedule, regulation, fixed decisions' }
    ];

    const CANVAS_FIELDS = [
      { id: 'can1', label: 'Decision Question', placeholder: 'What decision are we making?' },
      { id: 'can2', label: 'What We Know', placeholder: 'Facts, data, assumptions' },
      { id: 'can3', label: 'Decision & Next Action', placeholder: 'Chosen option and immediate next step' }
    ];

    function loadData() {
      try {
        decisions = HubStorage.get(STORAGE_KEY) || [];
      } catch (e) {
        decisions = [];
      }
      if (!Array.isArray(decisions)) decisions = [];
    }

    function saveData() {
      HubStorage.set(STORAGE_KEY, decisions);
    }

    // ─── INITIALIZATION ──────────────────────────────────────────────────────────
    loadData();
    renderSidebar();

    function getProjectName(pid) {
      if (!pid) return 'No Project';
      const p = HubData.getProject?.(pid);
      return p ? p.name : 'Unknown Project';
    }

    // ─── SIDEBAR RENDERING ───────────────────────────────────────────────────────
    function renderSidebar() {
      const nav = document.getElementById('sidebar-nav');
      nav.innerHTML = '';

      const byProject = {};
      decisions.forEach(d => {
        const pid = d.projectId || 'none';
        if (!byProject[pid]) byProject[pid] = [];
        byProject[pid].push(d);
      });

      // Render groups
      for (const pid of Object.keys(byProject)) {
        const group = document.createElement('div');
        group.className = 'nav-group';

        const label = document.createElement('div');
        label.className = 'nav-group-label';
        label.innerHTML = `<span>${getProjectName(pid === 'none' ? null : pid)}</span> <span class="nav-badge">${byProject[pid].length}</span>`;
        group.appendChild(label);

        byProject[pid].forEach(d => {
          const item = document.createElement('div');
          item.className = 'nav-item' + (currentId === d.id ? ' active' : '');

          let icon = '◎';
          if (d.type === 'note') icon = '✎';
          if (d.type === 'risk') icon = '⚠';
          if (d.type === 'open') icon = '？';

          item.innerHTML = `<span class="nav-icon">${icon}</span> <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.title || 'Untitled'}</span>`;
          item.onclick = () => openDecision(d.id);
          group.appendChild(item);
        });

        nav.appendChild(group);
      }

      if (decisions.length === 0) {
        nav.innerHTML = `<div style="padding: 20px; text-align: center; color: var(--text3); font-size: 12px;">No items yet.</div>`;
      }
    }

    // ─── LOGIC ───────────────────────────────────────────────────────────────────
    function createNew() {
      const id = 'dh-' + Date.now().toString(36);
      const dec = {
        id,
        projectId: '',
        title: 'New Item',
        type: 'decision',
        confidence: 'medium',
        summary: '',
        reason: '',
        tags: '',
        links: '',
        obsidianNote: '',
        problemLens: {},
        decisionCanvas: {},
        optionMap: [],
        alignment: []
      };
      decisions.push(dec);
      saveData();
      openDecision(id);
      renderSidebar();
    }

    function openDecision(id) {
      currentId = id;
      document.getElementById('view-toggle').style.display = 'flex';
      document.getElementById('btn-save').style.display = 'block';
      document.getElementById('btn-delete').style.display = 'block';
      renderSidebar();
      renderContent();
    }

    function switchTab(tab) {
      if (currentId) {
        // save current tab state before switching
        saveCurrent();
      }
      currentTab = tab;
      document.querySelectorAll('.view-toggle-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      renderContent();
    }

    function deleteCurrent() {
      if (!currentId) return;
      if (!confirm('Are you sure you want to delete this item?')) return;
      decisions = decisions.filter(d => d.id !== currentId);
      saveData();
      currentId = null;
      document.getElementById('view-toggle').style.display = 'none';
      document.getElementById('btn-save').style.display = 'none';
      document.getElementById('btn-delete').style.display = 'none';
      document.getElementById('topbar-title').innerText = 'Select an item';
      document.getElementById('main-content').innerHTML = `
        <div class="empty-state">
          <div class="e-icon">◎</div>
          <div class="e-title">Item Deleted</div>
        </div>
      `;
      renderSidebar();
    }

    function saveCurrent() {
      if (!currentId) return;
      const dec = decisions.find(d => d.id === currentId);
      if (!dec) return;

      if (currentTab === 'log') {
        dec.title = document.getElementById('i-title').value;
        dec.projectId = document.getElementById('i-project').value;
        dec.type = document.getElementById('i-type').value;
        dec.confidence = document.getElementById('i-conf').value;
        dec.summary = document.getElementById('i-summary').value;
        dec.reason = document.getElementById('i-reason').value;
        dec.tags = document.getElementById('i-tags').value;
        dec.obsidianNote = (document.getElementById('i-obsidian')?.value || '').trim();
      }
      else if (currentTab === 'workspace') {
        PROBLEM_FIELDS.forEach(f => {
          dec.problemLens[f.id] = document.getElementById('pl-' + f.id)?.value || '';
        });
        CANVAS_FIELDS.forEach(f => {
          dec.decisionCanvas[f.id] = document.getElementById('dc-' + f.id)?.value || '';
        });

        // Option Map Save natively handled on input change 
      }

      saveData();
      renderSidebar();
      document.getElementById('topbar-title').innerText = dec.title || 'Untitled';
    }

    // ─── RENDERING CONTENT ───────────────────────────────────────────────────────
    function renderContent() {
      const dec = decisions.find(d => d.id === currentId);
      if (!dec) return;

      document.getElementById('topbar-title').innerText = dec.title || 'Untitled';
      const c = document.getElementById('main-content');
      c.innerHTML = '';

      if (currentTab === 'log') {
        const projOpts = HubData.getProjects().map(p => `<option value="${p.id}" ${dec.projectId === p.id ? 'selected' : ''}>${p.name}</option>`).join('');

        c.innerHTML = `
          <div class="card">
            <div class="form-row">
              <div class="form-group" style="flex:2">
                <label class="form-label">Title</label>
                <input class="form-input" id="i-title" value="${dec.title || ''}">
              </div>
              <div class="form-group">
                <label class="form-label">Project</label>
                <select class="form-select" id="i-project">
                  <option value="">— No Project —</option>
                  ${projOpts}
                </select>
              </div>
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Type</label>
                <select class="form-select" id="i-type">
                  <option value="decision" ${dec.type === 'decision' ? 'selected' : ''}>Decision</option>
                  <option value="note" ${dec.type === 'note' ? 'selected' : ''}>Note</option>
                  <option value="risk" ${dec.type === 'risk' ? 'selected' : ''}>Risk</option>
                  <option value="open" ${dec.type === 'open' ? 'selected' : ''}>Open Q</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Confidence</label>
                <select class="form-select" id="i-conf">
                  <option value="high" ${dec.confidence === 'high' ? 'selected' : ''}>High</option>
                  <option value="medium" ${dec.confidence === 'medium' ? 'selected' : ''}>Medium</option>
                  <option value="low" ${dec.confidence === 'low' ? 'selected' : ''}>Low</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Tags</label>
                <input class="form-input" id="i-tags" value="${dec.tags || ''}" placeholder="Comma separated">
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Summary / Action</label>
              <textarea class="form-textarea" id="i-summary" style="min-height:100px">${dec.summary || ''}</textarea>
            </div>
            
            <div class="form-group">
              <label class="form-label">Reasoning & Evidence</label>
              <textarea class="form-textarea" id="i-reason" style="min-height:100px">${dec.reason || ''}</textarea>
            </div>

            <div class="form-group" style="display:flex;gap:10px;align-items:flex-end">
              <div style="flex:1">
                <label class="form-label">Obsidian Note</label>
                <input class="form-input" id="i-obsidian" value="${(dec.obsidianNote || '').replace(/"/g, '&quot;')}" placeholder="Optional: path/to/note.md">
              </div>
              ${(() => { const v = (HubStorage.get('hub-settings-v1') || {}).obsidianVault || ''; return (dec.obsidianNote && v) ? `<a href="obsidian://open?vault=${encodeURIComponent(v)}&file=${encodeURIComponent(dec.obsidianNote)}" style="display:inline-flex;align-items:center;gap:4px;padding:8px 12px;background:var(--surface3);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text2);text-decoration:none;font-size:12px;font-weight:500;white-space:nowrap;transition:background 0.12s" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='var(--surface3)'">⟡ Open</a>` : ''; })()}
            </div>
          </div>
        `;
      }
      else if (currentTab === 'workspace') {
        const plFirst = PROBLEM_FIELDS[0];
        const plRest  = PROBLEM_FIELDS.slice(1);
        const dcFirst = CANVAS_FIELDS[0];
        const dcRest  = CANVAS_FIELDS.slice(1);
        const plHasExtra = plRest.some(f => dec.problemLens?.[f.id]);
        const dcHasExtra = dcRest.some(f => dec.decisionCanvas?.[f.id]);

        const fieldHtml = (f, prefix) => `
          <div class="form-group">
            <label class="form-label">${f.label}</label>
            <textarea class="form-textarea" id="${prefix}-${f.id}" placeholder="${f.placeholder}">${dec[prefix === 'pl' ? 'problemLens' : 'decisionCanvas']?.[f.id] || ''}</textarea>
          </div>`;

        const plHtml = `
          ${fieldHtml(plFirst, 'pl')}
          <div class="ws-extra${plHasExtra ? ' open' : ''}" id="pl-extra">
            ${plRest.map(f => fieldHtml(f, 'pl')).join('')}
          </div>
          <button class="ws-expand-btn" id="pl-expand-btn" onclick="toggleWsExtra('pl-extra','pl-expand-btn')">${plHasExtra ? 'Show less ↑' : 'Show more context ↓'}</button>`;

        const dcHtml = `
          ${fieldHtml(dcFirst, 'dc')}
          <div class="ws-extra${dcHasExtra ? ' open' : ''}" id="dc-extra">
            ${dcRest.map(f => fieldHtml(f, 'dc')).join('')}
          </div>
          <button class="ws-expand-btn" id="dc-expand-btn" onclick="toggleWsExtra('dc-extra','dc-expand-btn')">${dcHasExtra ? 'Show less ↑' : 'Show more context ↓'}</button>`;

        c.innerHTML = `
          <div class="ws-action-bar">
            <button class="ws-kmqt-btn" onclick="sendToKmqt()">⊞ Send as KMQT Question</button>
          </div>
          <div class="grid-2">
            <div class="card">
              <div class="card-header"><div class="card-title">Problem Lens</div></div>
              ${plHtml}
            </div>
            <div class="card">
              <div class="card-header"><div class="card-title">Decision Canvas</div></div>
              ${dcHtml}
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-title">Option Map</div>
              <button class="btn-ghost" id="add-opt-btn">+ Add Option</button>
            </div>
            <table id="opt-table">
              <thead><tr><th>Option</th><th>Upside</th><th>Downside</th><th>Owner</th><th style="width:50px"></th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        `;

        document.getElementById('add-opt-btn').onclick = () => {
          dec.optionMap = dec.optionMap || [];
          dec.optionMap.push({ option: '', upside: '', downside: '', owner: '' });
          saveData();
          renderContent();
        };

        const tbody = c.querySelector('tbody');
        const opts = dec.optionMap || [];
        opts.forEach((opt, idx) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><input value="${opt.option}" onchange="updateOpt(${idx}, 'option', this.value)"></td>
            <td><input value="${opt.upside}" onchange="updateOpt(${idx}, 'upside', this.value)"></td>
            <td><input value="${opt.downside}" onchange="updateOpt(${idx}, 'downside', this.value)"></td>
            <td><input value="${opt.owner}" onchange="updateOpt(${idx}, 'owner', this.value)"></td>
            <td><button class="btn-danger" onclick="delOpt(${idx})">✕</button></td>
          `;
          tbody.appendChild(tr);
        });
      }
      else if (currentTab === 'alignment') {
        const opts = dec.optionMap || [];
        const matrix = dec.alignmentMatrix || { stakeholders: [], votes: {} };
        const stks = matrix.stakeholders || [];
        const votes = matrix.votes || {};

        if (!opts.length) {
          c.innerHTML = `
            <div class="card" style="max-width:560px;margin:auto">
              <div class="empty-state">
                <div class="e-icon">◎</div>
                <div class="e-title">No options to vote on</div>
                <div class="e-sub" style="margin-top:6px">Add options in the <b>Workspace → Option Map</b> first,<br>then return here to collect alignment votes.</div>
              </div>
            </div>`;
          return;
        }

        const VOTE_CYCLE = { '': 'yes', 'yes': 'maybe', 'maybe': 'no', 'no': '' };
        const VOTE_LABEL = { yes: '✓ Yes', maybe: '~ Maybe', no: '✗ No', '': '—' };

        // Compute consensus score per option
        const scores = opts.map((_, oi) => {
          let s = 0;
          stks.forEach(sk => {
            const v = votes[`${sk.id}::${oi}`];
            if (v === 'yes') s++;
            else if (v === 'no') s--;
          });
          return s;
        });

        const optHeaders = opts.map(o =>
          `<th>${_esc(o.option || '(option)')}</th>`
        ).join('');

        const stkRows = stks.map(sk => {
          const cells = opts.map((_, oi) => {
            const key = `${sk.id}::${oi}`;
            const v = votes[key] || '';
            return `<td class="vote-cell" data-v="${v}" onclick="cycleVote('${sk.id}',${oi})">${VOTE_LABEL[v]}</td>`;
          }).join('');
          return `<tr>
            <td>${_esc(sk.name)}</td>
            <td>${_esc(sk.role)}</td>
            ${cells}
            <td><button class="btn-danger" onclick="removeStakeholder('${sk.id}')" aria-label="Remove ${_esc(sk.name)}">✕</button></td>
          </tr>`;
        }).join('');

        const scoreRow = stks.length ? `
          <tr class="score-row">
            <td colspan="2" style="color:var(--text3)">Consensus</td>
            ${scores.map(s => {
          const cls = s > 0 ? 'score-pos' : s < 0 ? 'score-neg' : 'score-neu';
          return `<td class="score-cell"><span class="${cls}">${s > 0 ? '+' : ''}${s || '0'}</span></td>`;
        }).join('')}
            <td></td>
          </tr>` : '';

        const emptyMsg = !stks.length
          ? `<tr><td colspan="${opts.length + 3}" style="text-align:center;color:var(--text3);padding:24px">No stakeholders yet — add one below.</td></tr>`
          : '';

        c.innerHTML = `
          <div class="card">
            <div class="card-header">
              <div class="card-title">Alignment Matrix</div>
            </div>
            <div style="overflow-x:auto">
              <table class="align-matrix" role="grid" aria-label="Alignment voting matrix">
                <thead>
                  <tr>
                    <th scope="col">Stakeholder</th>
                    <th scope="col">Role</th>
                    ${optHeaders}
                    <th scope="col"></th>
                  </tr>
                </thead>
                <tbody>
                  ${emptyMsg}
                  ${stkRows}
                  ${scoreRow}
                </tbody>
              </table>
            </div>

            <div style="border-top:1px solid var(--border);padding-top:16px;margin-top:16px">
              <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px">Add Stakeholder</div>
              <div class="form-row" style="flex-wrap:wrap;gap:8px">
                <input class="form-input" id="sk-name" placeholder="Name" style="width:140px;flex:0 0 140px" aria-label="Stakeholder name">
                <select class="form-select" id="sk-role" style="width:130px;flex:0 0 130px" aria-label="Stakeholder role">
                  <option>Lead</option><option>Tech</option><option>Design</option>
                  <option>Product</option><option>Strategy</option><option>Stakeholder</option>
                </select>
                <button class="btn-ghost" onclick="addStakeholder()">+ Add</button>
              </div>
            </div>
            <div class="align-hint">Click a vote cell to cycle: — → ✓ Yes → ~ Maybe → ✗ No → —</div>
          </div>`;
      }
    }

    // Expose option helpers globally for inline onclick
    function toggleWsExtra(extraId, btnId) {
      const extra = document.getElementById(extraId);
      const btn   = document.getElementById(btnId);
      if (!extra || !btn) return;
      const open = extra.classList.toggle('open');
      btn.textContent = open ? 'Show less ↑' : 'Show more context ↓';
    }

    function sendToKmqt() {
      const dec = decisions.find(d => d.id === currentId);
      if (!dec) return;
      const title = (dec.title || '').trim();
      if (!title) { alert('Save a decision title first.'); return; }
      const km = HubStorage.get('kmqt_current_v2') || { columns: { K: [], M: [], Q: [], T: [] }, labels: {} };
      if (!km.columns) km.columns = { K: [], M: [], Q: [], T: [] };
      if (!km.columns.Q) km.columns.Q = [];
      km.columns.Q.push({
        id: 'q-' + Math.random().toString(36).slice(2, 9),
        text: `[Decision] ${title}`,
        createdAt: new Date().toISOString()
      });
      HubStorage.set('kmqt_current_v2', km);
      const toast = document.createElement('div');
      toast.textContent = 'Sent to KMQT Q-column ✓';
      Object.assign(toast.style, {
        position:'fixed', bottom:'20px', left:'50%', transform:'translateX(-50%)',
        background:'var(--surface3)', border:'1px solid var(--border2)', borderRadius:'8px',
        padding:'8px 16px', fontSize:'12.5px', color:'var(--text)', zIndex:'999',
        pointerEvents:'none', transition:'opacity 0.3s'
      });
      document.body.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2000);
    }

    window.updateOpt = (idx, key, val) => {
      const dec = decisions.find(d => d.id === currentId);
      if (dec && dec.optionMap[idx]) {
        dec.optionMap[idx][key] = val;
        saveData();
      }
    };
    window.delOpt = (idx) => {
      const dec = decisions.find(d => d.id === currentId);
      if (dec) {
        dec.optionMap.splice(idx, 1);
        saveData();
        renderContent();
      }
    };
    function _ensureMatrix(dec) {
      if (!dec.alignmentMatrix || !Array.isArray(dec.alignmentMatrix.stakeholders)) {
        dec.alignmentMatrix = { stakeholders: [], votes: {} };
      }
      if (!dec.alignmentMatrix.votes) dec.alignmentMatrix.votes = {};
    }

    window.addStakeholder = () => {
      const dec = decisions.find(d => d.id === currentId);
      if (!dec) return;
      _ensureMatrix(dec);
      const name = (document.getElementById('sk-name').value || '').trim();
      if (!name) { document.getElementById('sk-name').focus(); return; }
      const role = document.getElementById('sk-role').value;
      dec.alignmentMatrix.stakeholders.push({ id: 'sk-' + Date.now().toString(36), name, role });
      saveData();
      renderContent();
    };

    window.removeStakeholder = (skId) => {
      const dec = decisions.find(d => d.id === currentId);
      if (!dec) return;
      _ensureMatrix(dec);
      dec.alignmentMatrix.stakeholders = dec.alignmentMatrix.stakeholders.filter(s => s.id !== skId);
      // Prune votes for this stakeholder
      Object.keys(dec.alignmentMatrix.votes).forEach(k => {
        if (k.startsWith(skId + '::')) delete dec.alignmentMatrix.votes[k];
      });
      saveData();
      renderContent();
    };

    const _VOTE_CYCLE = { '': 'yes', 'yes': 'maybe', 'maybe': 'no', 'no': '' };
    window.cycleVote = (skId, optIdx) => {
      const dec = decisions.find(d => d.id === currentId);
      if (!dec) return;
      _ensureMatrix(dec);
      const key = `${skId}::${optIdx}`;
      const next = _VOTE_CYCLE[dec.alignmentMatrix.votes[key] || ''];
      if (next === '') delete dec.alignmentMatrix.votes[key];
      else dec.alignmentMatrix.votes[key] = next;
      saveData();
      renderContent();
    };

    // Auto save on any input change within forms
    document.addEventListener('input', e => {
      if (e.target.matches('.form-input, .form-textarea, .form-select')) {
        saveCurrent();
      }
    });

  </script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      HubBootstrap.start('decision-hub');
    });
  </script>
</body>

</html>
