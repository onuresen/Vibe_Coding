<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dependency Graph - Thinking Hub</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap">
  <link rel="stylesheet" href="theme.css">
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <script src="hub-storage.js"></script>
  <script src="hub-links.js"></script>
  <style>
    body {
      margin: 0; padding: 0; background: var(--bg); color: var(--text);
      font-family: var(--font-b); display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      padding: 12px 20px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface);
      z-index: 10;
    }
    .header-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .header-title { font-family: var(--font-d); font-size: 15px; font-weight: 800; }
    .header-subtitle { font-size: 11px; color: var(--text3); font-family: var(--font-m); }

    /* ── Filter chips ───────────────────────────────────────── */
    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; min-height: 22px; }
    .filter-label { font-size: 11px; color: var(--text3); margin-right: 2px; flex-shrink: 0; }
    .filter-chip {
      padding: 2px 10px; border-radius: 999px;
      border: 1px solid var(--chip-color, var(--border));
      background: transparent; color: var(--text3);
      font-size: 11px; cursor: pointer; font-family: var(--font-b);
      transition: all 0.12s; opacity: 0.45;
    }
    .filter-chip.active { color: var(--text); opacity: 1; background: rgba(0,0,0,0.2); }
    .filter-chip:hover { opacity: 1; }

    /* ── Network canvas ─────────────────────────────────────── */
    #mynetwork { flex: 1; width: 100%; background: var(--bg); }

    /* ── Bottom controls ────────────────────────────────────── */
    .controls {
      position: absolute; bottom: 20px; left: 20px;
      display: flex; gap: 8px; z-index: 100;
    }
    .btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px;
      font-family: var(--font-b); transition: all 0.15s;
    }
    .btn:hover { background: var(--accent-dim); color: var(--accent); border-color: rgba(184,240,51,0.4); }
    .btn.frozen { background: var(--accent-dim); color: var(--accent); border-color: rgba(184,240,51,0.4); }

    /* ── Legend ─────────────────────────────────────────────── */
    .legend {
      position: absolute; top: 20px; right: 20px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px;
      z-index: 100; font-size: 11px;
      display: none; flex-direction: column; gap: 7px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    }
    .legend.visible { display: flex; }
    .legend-title { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
    .legend-item { display: flex; align-items: center; gap: 8px; color: var(--text2); }
    .legend-swatch {
      width: 12px; height: 12px; border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.18); flex-shrink: 0;
    }
    .legend-hint {
      margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border);
      color: var(--text3); font-size: 10px; line-height: 1.5;
    }

    /* ── Empty state ────────────────────────────────────────── */
    .empty-state {
      position: absolute; inset: 0; display: none;
      align-items: center; justify-content: center;
      flex-direction: column; text-align: center;
      z-index: 50; padding: 20px; pointer-events: none;
    }
    .empty-state.visible { display: flex; }
    .empty-icon { font-size: 36px; margin-bottom: 14px; opacity: 0.35; }
    .empty-title { font-family: var(--font-d); font-size: 15px; color: var(--text2); margin-bottom: 8px; }
    .empty-text { font-size: 12px; color: var(--text3); max-width: 280px; line-height: 1.6; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-row">
      <div class="header-title">Dependency Graph</div>
      <div class="header-subtitle" id="stats">0 nodes · 0 links</div>
    </div>
    <div class="filter-bar" id="filter-bar"></div>
  </div>

  <div class="controls">
    <button class="btn" onclick="fitGraph()">Fit to Screen</button>
    <button class="btn" id="physics-btn" onclick="togglePhysics()">Freeze Layout</button>
  </div>

  <div class="legend" id="legend"></div>

  <div id="empty" class="empty-state">
    <div class="empty-icon">🕸️</div>
    <div class="empty-title">No relationships yet</div>
    <div class="empty-text">Start linking your tasks, ideas, and decisions across the Thinking Hub — they'll appear here as a live graph.</div>
  </div>

  <div id="mynetwork"></div>

  <script>
    HubLinks.init('graph-hub');

    const TOOL_COLORS = {
      'project-hub':  { bg: '#1c2d47', border: '#3a5f96' },
      'decision-hub': { bg: '#3a1e1e', border: '#7a3535' },
      'kmqt-board':   { bg: '#2b1e3a', border: '#5e3a7a' },
      'idea-swiper':  { bg: '#1e3828', border: '#3a7a52' },
      'schedule':     { bg: '#38321c', border: '#7a6a30' },
      'canvas-hub':   { bg: '#1c3838', border: '#30787a' },
    };

    const TOOL_LABELS = {
      'project-hub':  'Project Hub',
      'decision-hub': 'Decision Hub',
      'kmqt-board':   'KMQT Board',
      'idea-swiper':  'Idea Swiper',
      'schedule':     'Schedule',
      'canvas-hub':   'Canvas',
    };

    let network = null;
    let nodesMap = new Map();
    let hiddenTools = new Set();
    let physicsEnabled = true;

    // ── Controls ──────────────────────────────────────────────

    function fitGraph() {
      if (network) network.fit({ animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
    }

    function togglePhysics() {
      physicsEnabled = !physicsEnabled;
      if (network) network.setOptions({ physics: { enabled: physicsEnabled } });
      const btn = document.getElementById('physics-btn');
      btn.textContent = physicsEnabled ? 'Freeze Layout' : 'Resume Physics';
      btn.classList.toggle('frozen', !physicsEnabled);
    }

    // ── Filtering ─────────────────────────────────────────────

    function applyFilters() {
      if (!network) return;
      const updates = [];
      nodesMap.forEach((node, id) => {
        updates.push({ id, hidden: hiddenTools.has(node.tool) });
      });
      network.body.data.nodes.update(updates);
      updateStats();
    }

    function updateStats() {
      const visible = Array.from(nodesMap.values()).filter(n => !hiddenTools.has(n.tool)).length;
      const totalEdges = network ? network.body.data.edges.length : 0;
      document.getElementById('stats').textContent = `${visible} nodes · ${totalEdges} links`;
    }

    // ── Filter bar ────────────────────────────────────────────

    function buildFilterBar(tools) {
      const bar = document.getElementById('filter-bar');
      bar.innerHTML = '';
      if (!tools.length) return;

      const label = document.createElement('span');
      label.className = 'filter-label';
      label.textContent = 'Show:';
      bar.appendChild(label);

      tools.forEach(tool => {
        const colors = TOOL_COLORS[tool] || { border: '#555' };
        const chip = document.createElement('button');
        chip.className = 'filter-chip active';
        chip.dataset.tool = tool;
        chip.style.setProperty('--chip-color', colors.border);
        chip.textContent = TOOL_LABELS[tool] || tool;
        chip.onclick = () => {
          if (hiddenTools.has(tool)) {
            hiddenTools.delete(tool);
            chip.classList.add('active');
          } else {
            hiddenTools.add(tool);
            chip.classList.remove('active');
          }
          applyFilters();
        };
        bar.appendChild(chip);
      });
    }

    // ── Legend ────────────────────────────────────────────────

    function buildLegend(tools) {
      const legend = document.getElementById('legend');
      if (!tools.length) { legend.classList.remove('visible'); return; }
      legend.classList.add('visible');
      legend.innerHTML = `<div class="legend-title">Tools</div>`;
      tools.forEach(tool => {
        const c = TOOL_COLORS[tool] || { bg: '#333', border: '#555' };
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<div class="legend-swatch" style="background:${c.bg};border-color:${c.border}"></div><span>${TOOL_LABELS[tool] || tool}</span>`;
        legend.appendChild(item);
      });
      const hint = document.createElement('div');
      hint.className = 'legend-hint';
      hint.innerHTML = 'Double-click a node to open it';
      legend.appendChild(hint);
    }

    // ── Build graph ───────────────────────────────────────────

    function buildGraph() {
      const links = HubLinks.getAll();

      if (!links || links.length === 0) {
        document.getElementById('empty').classList.add('visible');
        if (network) { network.destroy(); network = null; }
        nodesMap.clear();
        document.getElementById('stats').textContent = '0 nodes · 0 links';
        document.getElementById('filter-bar').innerHTML = '';
        document.getElementById('legend').classList.remove('visible');
        return;
      }

      document.getElementById('empty').classList.remove('visible');
      nodesMap = new Map();
      const edges = [];

      function nodeId(tool, itemId) { return `${tool}::${itemId}`; }

      links.forEach(link => {
        [link.a, link.b].forEach(side => {
          const id = nodeId(side.tool, side.itemId);
          if (nodesMap.has(id)) return;
          const c = TOOL_COLORS[side.tool] || { bg: '#2a2a30', border: '#555' };
          nodesMap.set(id, {
            id,
            label: (side.label || 'Untitled').slice(0, 40),
            tool: side.tool,
            itemId: side.itemId,
            title: `<b>${TOOL_LABELS[side.tool] || side.tool}</b><br>${side.label || 'Untitled'}`,
            hidden: hiddenTools.has(side.tool),
            color: {
              background: c.bg,
              border: c.border,
              highlight: { background: c.bg, border: '#b8f033' },
              hover:      { background: c.bg, border: c.border }
            },
            font: { color: '#e8e8f0', size: 12, face: 'DM Sans, sans-serif' },
            shape: 'box',
            borderWidth: 1,
            margin: { top: 8, bottom: 8, left: 10, right: 10 }
          });
        });

        edges.push({
          from: nodeId(link.a.tool, link.a.itemId),
          to:   nodeId(link.b.tool, link.b.itemId),
          color: {
            color:     'rgba(255,255,255,0.1)',
            highlight: '#b8f033',
            hover:     'rgba(184,240,51,0.35)'
          },
          width: 1,
          selectionWidth: 2,
          smooth: { type: 'curvedCW', roundness: 0.1 }
        });
      });

      const nodes = Array.from(nodesMap.values());
      const tools = [...new Set(nodes.map(n => n.tool))];

      buildFilterBar(tools);
      buildLegend(tools);

      if (network) network.destroy();

      network = new vis.Network(
        document.getElementById('mynetwork'),
        { nodes, edges },
        {
          physics: {
            enabled: physicsEnabled,
            forceAtlas2Based: {
              gravitationalConstant: -80,
              centralGravity: 0.004,
              springLength: 160,
              springConstant: 0.06
            },
            minVelocity: 0.5,
            solver: 'forceAtlas2Based'
          },
          interaction: {
            hover: true,
            tooltipDelay: 150,
            zoomView: true,
            dragView: true,
            navigationButtons: false
          }
        }
      );

      network.on('doubleClick', params => {
        if (!params.nodes.length) return;
        const node = nodesMap.get(params.nodes[0]);
        if (node) HubLinks.navigateTo(node.tool, node.itemId);
      });

      network.on('stabilized', updateStats);
      updateStats();
    }

    buildGraph();
    HubStorage.subscribe('hub-links-v1', buildGraph);
    window.__hl_onLinkChange = buildGraph;
  </script>
</body>
</html>
