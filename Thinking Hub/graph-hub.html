<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dependency Graph - Thinking Hub</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap">
  <link rel="stylesheet" href="theme.css">
  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <script src="hub-storage.js"></script>
  <script src="hub-links.js"></script>
  <style>
    body {
      margin: 0; padding: 0; background: var(--surface); color: var(--text);
      font-family: var(--font-b); display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
    }
    .header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; background: var(--surface); z-index: 10;
    }
    .header-title {
      font-family: var(--font-d); font-size: 16px; font-weight: 800;
    }
    .header-subtitle {
      font-size: 12px; color: var(--text3); font-family: var(--font-m);
    }
    #mynetwork {
      flex: 1; width: 100%; height: 100%; background: var(--surface);
    }
    
    /* ── Controls Overlay ────────────────────────────────────── */
    .controls {
      position: absolute; bottom: 20px; left: 20px;
      display: flex; gap: 8px; z-index: 100;
    }
    .btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px;
      font-family: var(--font-b); transition: all 0.15s;
    }
    .btn:hover { background: var(--accent-dim); color: var(--accent); border-color: rgba(184, 240, 51, 0.4); }
    
    .empty-state {
      position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
      flex-direction: column; text-align: center; z-index: 50; padding: 20px; pointer-events: none;
    }
    .empty-state.visible { display: flex; }
    .empty-icon { font-size: 32px; color: var(--text3); margin-bottom: 12px; opacity: 0.5; }
    .empty-text { font-size: 13px; color: var(--text2); max-width: 300px; line-height: 1.5; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">Dependency Graph</div>
    <div class="header-subtitle" id="stats">0 nodes, 0 relationships</div>
  </div>

  <div class="controls">
    <button class="btn" onclick="network.fit()">Fit to Screen</button>
    <button class="btn" onclick="network.clusterOutliers()">Group Outliers</button>
  </div>

  <div id="empty" class="empty-state">
    <div class="empty-icon">🕸️</div>
    <div class="empty-text">No relationships found. Start linking your tasks, ideas, and decisions across the Thinking Hub to see them visualized here.</div>
  </div>

  <div id="mynetwork"></div>

  <script>
    HubLinks.init('graph-hub');

    const TOOL_COLORS = {
      'project-hub': { background: '#2B3956', border: '#4A6293', hover: '#3A4C73' }, // Blue
      'decision-hub': { background: '#4A2A2A', border: '#8B4545', hover: '#5A3333' }, // Red/Orange
      'kmqt-board': { background: '#3D2A4A', border: '#6E458B', hover: '#4D355C' }, // Purple
      'idea-swiper': { background: '#2A4A35', border: '#458B5C', hover: '#335A41' }, // Green
      'schedule': { background: '#4A422A', border: '#8B7B45', hover: '#5A5033' }, // Yellow/Gold
    };

    let network = null;

    function buildGraph() {
      const links = HubLinks.getAll();
      
      if (!links || links.length === 0) {
        document.getElementById('empty').classList.add('visible');
        if (network) network.destroy();
        document.getElementById('stats').textContent = '0 nodes, 0 relationships';
        return;
      }
      
      document.getElementById('empty').classList.remove('visible');

      const nodesMap = new Map(); // key -> node
      const edges = [];

      function getNodeId(tool, itemId) { return `${tool}::${itemId}`; }

      links.forEach(link => {
        const idA = getNodeId(link.a.tool, link.a.itemId);
        const idB = getNodeId(link.b.tool, link.b.itemId);

        if (!nodesMap.has(idA)) {
          const colors = TOOL_COLORS[link.a.tool] || { background: '#333', border: '#555', hover: '#444' };
          nodesMap.set(idA, {
            id: idA,
            label: link.a.label || 'Untitled',
            tool: link.a.tool,
            itemId: link.a.itemId,
            group: link.a.tool,
            color: { background: colors.background, border: colors.border, highlight: { background: colors.hover, border: '#b8f033' } },
            font: { color: '#f0efe8', size: 12, face: 'var(--font-b)' },
            shape: 'box',
            borderWidth: 1,
            borderRadius: 6,
            margin: { top: 8, bottom: 8, left: 10, right: 10 }
          });
        }

        if (!nodesMap.has(idB)) {
          const colors = TOOL_COLORS[link.b.tool] || { background: '#333', border: '#555', hover: '#444' };
          nodesMap.set(idB, {
            id: idB,
            label: link.b.label || 'Untitled',
            tool: link.b.tool,
            itemId: link.b.itemId,
            group: link.b.tool,
            color: { background: colors.background, border: colors.border, highlight: { background: colors.hover, border: '#b8f033' } },
            font: { color: '#f0efe8', size: 12, face: 'var(--font-b)' },
            shape: 'box',
            borderWidth: 1,
            borderRadius: 6,
            margin: { top: 8, bottom: 8, left: 10, right: 10 }
          });
        }

        edges.push({
          from: idA,
          to: idB,
          color: { color: 'rgba(255,255,255,0.15)', highlight: '#b8f033' },
          width: 1,
          selectionWidth: 2,
          smooth: { type: 'continuous' }
        });
      });

      const nodes = Array.from(nodesMap.values());
      const container = document.getElementById('mynetwork');

      const data = { nodes: nodes, edges: edges };
      const options = {
        physics: {
          forceAtlas2Based: {
            gravitationalConstant: -70,
            centralGravity: 0.005,
            springLength: 150,
            springConstant: 0.08
          },
          minVelocity: 0.75,
          solver: 'forceAtlas2Based'
        },
        interaction: {
          hover: true,
          tooltipDelay: 200,
          zoomView: true,
          dragView: true
        }
      };

      if (network) {
        network.destroy();
      }
      network = new vis.Network(container, data, options);

      // On double click, navigate to item
      network.on("doubleClick", function (params) {
        if (params.nodes.length > 0) {
          const nodeId = params.nodes[0];
          const node = nodesMap.get(nodeId);
          if (node) {
            HubLinks.navigateTo(node.tool, node.itemId);
          }
        }
      });
      
      document.getElementById('stats').textContent = `${nodes.length} nodes, ${edges.length} relationships`;
    }

    // Initial render
    buildGraph();

    // Listen for changes from other tabs to re-render dynamically
    HubStorage.subscribe('hub-links-v1', buildGraph);
    window.__hl_onLinkChange = buildGraph;

  </script>
</body>
</html>
