<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProblemLens</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:#0f0f11;color:#f0efe8;height:100vh;display:flex;flex-direction:column
    }
    header{
      padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.08);
      font-weight:800;display:flex;align-items:center;gap:8px;font-size:16px
    }
    header span{color:#7c6af5}
    .hint{color:#b7b6c3;font-size:12px}
    .main{flex:1;padding:16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
    .card{
      background:#1a1a1f;border:1px solid rgba(255,255,255,.08);
      border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:6px
    }
    .title{font-size:11px;font-weight:900;letter-spacing:1.2px;text-transform:uppercase;color:#b7b6c3}
    textarea{
      background:#222228;border:1px solid rgba(255,255,255,.08);
      border-radius:10px;color:#f0efe8;font-size:13px;padding:9px;resize:vertical;line-height:1.55
    }
    textarea:focus{outline:2px solid rgba(124,106,245,.6)}
    .footer{
      border-top:1px solid rgba(255,255,255,.08);padding:10px 16px;display:flex;gap:8px;align-items:center
    }
    button{
      border:none;border-radius:10px;padding:8px 12px;font-weight:800;font-size:12.5px;cursor:pointer
    }
    .primary{background:#7c6af5;color:#fff}
    .ghost{background:transparent;color:#b7b6c3;border:1px solid rgba(255,255,255,.18)}
    .ghost:hover{background:#222228;color:#fff}
    .danger:hover{background:#e8455a;color:#fff}
  </style>
</head>
<body>
  <header>
    Problem<span>Lens</span>
    <span class="hint">Focus on the problem. No solutions yet.</span>
  </header>

  <div class="main">
    <div class="card">
      <div class="title">Problem to Be Solved</div>
      <textarea placeholder="What problem are we actually trying to solve?"></textarea>
    </div>

    <div class="card">
      <div class="title">Who Is Affected</div>
      <textarea placeholder="Who experiences the pain? Client, site, design, operations?"></textarea>
    </div>

    <div class="card">
      <div class="title">Why This Matters Now</div>
      <textarea placeholder="Why now? Trigger, deadline, risk, opportunity?"></textarea>
    </div>

    <div class="card">
      <div class="title">What Happens If We Do Nothing</div>
      <textarea placeholder="Cost, risk, delay, lost opportunity"></textarea>
    </div>

    <div class="card">
      <div class="title">Constraints & Assumptions</div>
      <textarea placeholder="Budget, schedule, regulation, fixed decisions"></textarea>
    </div>

    <div class="card">
      <div class="title">Out of Scope</div>
      <textarea placeholder="What is explicitly NOT part of this problem?"></textarea>
    </div>
  </div>

  <div class="footer">
    <button class="primary" onclick="save()">Save</button>
    <button class="ghost" onclick="resetAll()">Reset</button>
    <button class="ghost" onclick="exportJSON()">Export</button>
    <input type="file" id="file" accept="application/json" hidden>
    <span class="hint">Autosaved locally</span>
  </div>

<script>
const KEY = 'problem-lens-v1';
const fields = Array.from(document.querySelectorAll('textarea'));

function save(){
  localStorage.setItem(KEY, JSON.stringify(fields.map(f=>f.value)));
}

function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return;
    JSON.parse(raw).forEach((v,i)=>fields[i].value=v);
  }catch(e){}
}

function resetAll(){
  if(!confirm('Clear this ProblemLens?')) return;
  fields.forEach(f=>f.value='');
  localStorage.removeItem(KEY);
}

function exportJSON(){
  const data = {
    type: 'ProblemLens',
    exportedAt: new Date().toISOString(),
    fields: fields.map(f=>f.value)
  };
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'problemlens.json';
  a.click();
}

load();
</script>
</body>
</html>
