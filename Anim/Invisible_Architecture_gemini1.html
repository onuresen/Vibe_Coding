<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Invisible Architecture</title>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
    }

    canvas {
      display: block;
      cursor: crosshair;
    }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    const particles = [];
    const walls = [
      // A simple architectural layout: central room with corridors
      { x1: 200, y1: 200, x2: 600, y2: 200 },
      { x1: 600, y1: 200, x2: 600, y2: 500 },
      { x1: 600, y1: 500, x2: 200, y2: 500 },
      { x1: 200, y1: 500, x2: 200, y2: 200 },
      { x1: 400, y1: 500, x2: 400, y2: 600 },
      { x1: 100, y1: 300, x2: 200, y2: 300 }
    ];

    let mouse = { x: -1000, y: -1000, pulse: 0 };

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.life = Math.random();
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;

        // Wall collision: make them "stagnate" or deflect near structures
        walls.forEach(w => {
          const dist = distToSegment(this.x, this.y, w.x1, w.y1, w.x2, w.y2);
          if (dist < 2) {
            this.vx *= -0.5;
            this.vy *= -0.5;
          }
        });

        if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) this.reset();
      }
      draw() {
        const d = Math.hypot(this.x - mouse.x, this.y - mouse.y);
        if (d < 150) {
          ctx.fillStyle = `rgba(255, 255, 255, ${0.1 * (1 - d / 150)})`;
          ctx.fillRect(this.x, this.y, 1, 1);
        }
      }
    }

    function distToSegment(px, py, x1, y1, x2, y2) {
      const l2 = (x1 - x2) ** 2 + (y1 - y2) ** 2;
      if (l2 === 0) return Math.hypot(px - x1, py - y1);
      let t = ((px - x1) * (x2 - x1) + (py - y1) * (y2 - y1)) / l2;
      t = Math.max(0, Math.min(1, t));
      return Math.hypot(px - (x1 + t * (x2 - x1)), py - (y1 + t * (y2 - y1)));
    }

    for (let i = 0; i < 2000; i++) particles.push(new Particle());

    function animate() {
      ctx.fillStyle = 'rgba(10, 10, 10, 0.15)';
      ctx.fillRect(0, 0, width, height);

      if (mouse.pulse > 0) {
        ctx.strokeStyle = `rgba(255, 255, 255, ${mouse.pulse * 0.2})`;
        ctx.beginPath();
        ctx.arc(mouse.x, mouse.y, (1 - mouse.pulse) * 400, 0, Math.PI * 2);
        ctx.stroke();
        mouse.pulse -= 0.01;
      }

      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }

    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mousedown', () => { mouse.pulse = 1; });

    animate();
  </script>
</body>

</html>
