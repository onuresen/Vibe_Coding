<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AstroGen | Procedural Solar Sandbox</title>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050508;
      font-family: 'Courier New', Courier, monospace;
      color: #00ffcc;
    }

    canvas {
      display: block;
      cursor: crosshair;
    }

    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      pointer-events: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 5px #00ffcc;
    }

    #overlay {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 20, 20, 0.8);
      border: 1px solid #00ffcc;
      padding: 15px;
      display: none;
      min-width: 200px;
      pointer-events: auto;
    }

    .stat {
      margin-bottom: 5px;
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
    }

    .controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      font-size: 0.7rem;
      color: rgba(0, 255, 204, 0.5);
    }
  </style>
</head>

<body>

  <div id="ui">
    <h2 id="system-name">System Alpha-9</h2>
    <div id="time-display">Time: 1.0x</div>
  </div>

  <div id="overlay">
    <h3 id="p-name">Planet IV</h3>
    <hr>
    <div class="stat"><span>Type:</span> <span id="p-type">-</span></div>
    <div class="stat"><span>Radius:</span> <span id="p-rad">-</span></div>
    <div class="stat"><span>Orbital Prd:</span> <span id="p-orb">-</span></div>
    <div class="stat"><span>Temp:</span> <span id="p-temp">-</span></div>
    <div class="stat"><span>Habitability:</span> <span id="p-hab">-</span></div>
  </div>

  <div class="controls">
    [R] New System | [T] Time Scale | [Scroll] Zoom | [Drag] Tilt View
  </div>

  <canvas id="canvas"></canvas>

  <script>
    /** * SEEDED RANDOM GENERATOR 
     */
    class SeededRandom {
      constructor(seed) { this.seed = seed; }
      next() {
        this.seed = (this.seed * 1664525 + 1013904223) % 4294967296;
        return this.seed / 4294967296;
      }
      range(min, max) { return min + this.next() * (max - min); }
    }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height, rng;
    let system = { planets: [], star: {}, seed: Math.floor(Math.random() * 100000) };
    let view = { zoom: 1, tilt: 0.5, targetX: 0, targetY: 0, offsetX: 0, offsetY: 0, dragging: false, lastMouse: { x: 0, y: 0 } };
    let time = 0;
    let timeScale = 1;

    /**
     * INITIALIZATION & GENERATION
     */
    function initSystem(seed) {
      system.seed = seed;
      rng = new SeededRandom(seed);
      system.name = "Sector-" + Math.floor(rng.range(1000, 9999));
      document.getElementById('system-name').innerText = system.name;

      // Star properties
      system.star = {
        radius: rng.range(40, 70),
        color: `hsl(${rng.range(20, 60)}, 100%, 70%)`,
        glow: `hsl(${rng.range(20, 60)}, 100%, 40%)`
      };

      system.planets = [];
      const count = Math.floor(rng.range(3, 10));
      let lastDist = 120;

      for (let i = 0; i < count; i++) {
        lastDist += rng.range(60, 150);
        const p = {
          id: i,
          dist: lastDist,
          radius: rng.range(8, 25),
          speed: rng.range(0.002, 0.01) / (lastDist * 0.005),
          angle: rng.range(0, Math.PI * 2),
          color: `hsl(${rng.range(0, 360)}, 40%, 50%)`,
          type: rng.next() > 0.7 ? 'Gas Giant' : (rng.next() > 0.4 ? 'Rocky' : 'Oceanic'),
          moons: []
        };

        // Stats for UI
        p.temp = Math.floor(500 - (p.dist * 0.8)) + "K";
        p.hab = Math.max(0, Math.floor(100 - Math.abs(288 - parseInt(p.temp)) * 0.5)) + "%";

        if (p.radius > 18) {
          const mCount = Math.floor(rng.range(0, 3));
          for (let j = 0; j < mCount; j++) {
            p.moons.push({ dist: p.radius + 10 + (j * 10), radius: rng.range(2, 4), speed: rng.range(0.02, 0.05), angle: rng.range(0, Math.PI * 2) });
          }
        }
        system.planets.push(p);
      }
    }

    /**
     * RENDERING
     */
    function draw() {
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.fillStyle = '#050508';
      ctx.fillRect(0, 0, width, height);

      // Parallax Stars
      rng = new SeededRandom(system.seed);
      ctx.fillStyle = "#ffffff";
      for (let i = 0; i < 200; i++) {
        let x = rng.range(0, width);
        let y = rng.range(0, height);
        ctx.globalAlpha = rng.range(0.1, 0.5);
        ctx.fillRect(x, y, 1, 1);
      }
      ctx.globalAlpha = 1;

      ctx.translate(width / 2 + view.offsetX, height / 2 + view.offsetY);
      ctx.scale(view.zoom, view.zoom);

      // Draw Orbits
      system.planets.forEach(p => {
        ctx.beginPath();
        ctx.ellipse(0, 0, p.dist, p.dist * view.tilt, 0, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(0, 255, 204, 0.15)';
        ctx.lineWidth = 1 / view.zoom;
        ctx.stroke();
      });

      // Draw Star
      const g = ctx.createRadialGradient(0, 0, 0, 0, 0, system.star.radius);
      g.addColorStop(0, '#fff');
      g.addColorStop(0.4, system.star.color);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.globalCompositeOperation = 'lighter';
      ctx.beginPath();
      ctx.arc(0, 0, system.star.radius * 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalCompositeOperation = 'source-over';

      // Draw Planets
      system.planets.forEach(p => {
        p.angle += p.speed * timeScale;
        const px = Math.cos(p.angle) * p.dist;
        const py = Math.sin(p.angle) * p.dist * view.tilt;

        drawBody(px, py, p);

        p.moons.forEach(m => {
          m.angle += m.speed * timeScale;
          const mx = px + Math.cos(m.angle) * m.dist;
          const my = py + Math.sin(m.angle) * m.dist * view.tilt;
          drawBody(mx, my, m, true);
        });
      });

      requestAnimationFrame(draw);
    }

    function drawBody(x, y, p, isMoon = false) {
      ctx.save();
      ctx.translate(x, y);

      // Shadow direction (always away from center 0,0)
      const angleToSun = Math.atan2(y, x);

      // Sphere Base
      const grad = ctx.createRadialGradient(-p.radius * 0.3, -p.radius * 0.3, p.radius * 0.1, 0, 0, p.radius);
      grad.addColorStop(0, p.color || '#888');
      grad.addColorStop(1, '#000');

      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, p.radius, 0, Math.PI * 2);
      ctx.fill();

      // Subtle Surface Noise (Procedural Banding for Gas Giants)
      if (p.type === 'Gas Giant') {
        ctx.clip();
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        for (let i = -p.radius; i < p.radius; i += 4) {
          ctx.beginPath();
          ctx.moveTo(-p.radius, i);
          ctx.lineTo(p.radius, i);
          ctx.stroke();
        }
      }

      // Atmospheric rim glow
      if (p.type === 'Oceanic' || p.type === 'Gas Giant') {
        ctx.globalCompositeOperation = 'lighter';
        const rim = ctx.createRadialGradient(0, 0, p.radius * 0.8, 0, 0, p.radius);
        rim.addColorStop(0, 'transparent');
        rim.addColorStop(1, 'rgba(0, 255, 255, 0.4)');
        ctx.fillStyle = rim;
        ctx.fill();
      }

      ctx.restore();
    }

    /**
     * INTERACTION LOGIC
     */
    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    window.addEventListener('wheel', e => {
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      view.zoom = Math.min(Math.max(view.zoom * delta, 0.1), 5);
    });

    window.addEventListener('mousedown', e => { view.dragging = true; view.lastMouse = { x: e.clientX, y: e.clientY }; });
    window.addEventListener('mouseup', () => view.dragging = false);
    window.addEventListener('mousemove', e => {
      if (view.dragging) {
        const dx = e.clientX - view.lastMouse.x;
        const dy = e.clientY - view.lastMouse.y;
        view.offsetX += dx;
        view.tilt = Math.min(Math.max(view.tilt - dy * 0.005, 0), 1);
        view.lastMouse = { x: e.clientX, y: e.clientY };
      }
    });

    window.addEventListener('keydown', e => {
      if (e.key.toLowerCase() === 'r') initSystem(Math.floor(Math.random() * 100000));
      if (e.key.toLowerCase() === 't') {
        timeScale = timeScale === 1 ? 5 : (timeScale === 5 ? 50 : 1);
        document.getElementById('time-display').innerText = `Time: ${timeScale}.0x`;
      }
    });

    canvas.addEventListener('click', e => {
      const mx = (e.clientX - width / 2 - view.offsetX) / view.zoom;
      const my = (e.clientY - height / 2 - view.offsetY) / (view.zoom * view.tilt);
      const distClicked = Math.sqrt(mx * mx + my * my);

      let found = false;
      system.planets.forEach(p => {
        if (Math.abs(distClicked - p.dist) < p.radius * 2) {
          showPlanetInfo(p);
          found = true;
        }
      });
      if (!found) document.getElementById('overlay').style.display = 'none';
    });

    function showPlanetInfo(p) {
      const ov = document.getElementById('overlay');
      ov.style.display = 'block';
      document.getElementById('p-name').innerText = `Planet ${p.id + 1}`;
      document.getElementById('p-type').innerText = p.type;
      document.getElementById('p-rad').innerText = (p.radius * 400).toFixed(0) + " km";
      document.getElementById('p-orb').innerText = (1 / p.speed).toFixed(0) + " days";
      document.getElementById('p-temp').innerText = p.temp;
      document.getElementById('p-hab').innerText = p.hab;
    }

    // Start
    window.dispatchEvent(new Event('resize'));
    initSystem(system.seed);
    draw();

  </script>
</body>

</html>
