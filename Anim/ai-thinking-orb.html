<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Thinking</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  }

  canvas#orb {
    display: block;
    width: 800px;
    height: 800px;
  }

  .task-text {
    margin-top: 18px;
    font-size: 13px;
    color: rgba(180, 185, 220, 0.7);
    letter-spacing: 0.06em;
    min-height: 20px;
    text-align: center;
    opacity: 1;
    transition: opacity 0.4s ease;
  }

  .task-text.fade { opacity: 0; }

  @media (prefers-color-scheme: light) {
    body { background: #f0f2f8; }
    .task-text { color: rgba(60, 70, 130, 0.7); }
  }

  @media (max-width: 840px) {
    canvas#orb { width: 100vw; height: 100vw; }
  }
</style>
</head>
<body>

<canvas id="orb" width="800" height="800"></canvas>
<div class="task-text" id="taskLabel">Initializing neural pathways…</div>

<script>
(function(){
  const canvas = document.getElementById('orb');
  const ctx = canvas.getContext('2d');
  const W = 800, H = 800, CX = W/2, CY = H/2;
  const R = 220;

  const tasks = [
    'Analyzing context…',
    'Searching vector space…',
    'Optimizing response…',
    'Embedding semantic tokens…',
    'Running inference pass…',
    'Resolving attention heads…',
    'Sampling probability distribution…',
    'Compressing latent space…',
    'Aligning gradient descent…',
    'Loading knowledge graph…',
    'Evaluating reward signal…',
    'Tokenizing input stream…',
    'Traversing reasoning tree…',
    'Calibrating uncertainty…'
  ];

  let taskIdx = 0;
  const label = document.getElementById('taskLabel');

  function cycleTask(){
    label.classList.add('fade');
    setTimeout(()=>{
      taskIdx = (taskIdx + 1) % tasks.length;
      label.textContent = tasks[taskIdx];
      label.classList.remove('fade');
    }, 420);
  }
  setInterval(cycleTask, 2600);

  const DOT_COUNT = 200;
  const dots = [];
  for(let i = 0; i < DOT_COUNT; i++){
    const u = Math.random(), v = Math.random();
    const theta = 2 * Math.PI * u;
    const phi = Math.acos(2 * v - 1);
    dots.push({
      theta,
      phi,
      speed: (Math.random() - 0.5) * 0.004 + 0.006,
      phiDrift: (Math.random() - 0.5) * 0.002,
      size: Math.random() * 1.6 + 0.8,
      baseAlpha: Math.random() * 0.5 + 0.3,
      pulseOffset: Math.random() * Math.PI * 2
    });
  }

  const PULSE_COUNT = 4;
  const pulses = Array.from({length: PULSE_COUNT}, (_, i) => ({
    phase: i / PULSE_COUNT,
    speed: 0.28 + Math.random() * 0.12,
    width: 0.18
  }));

  let t = 0;
  const globalTilt = 0.32;

  function isDark(){
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  }

  function project(theta, phi){
    const x0 = Math.sin(phi) * Math.cos(theta);
    const y0 = Math.sin(phi) * Math.sin(theta);
    const z0 = Math.cos(phi);
    const y1 = y0 * Math.cos(globalTilt) - z0 * Math.sin(globalTilt);
    const z1 = y0 * Math.sin(globalTilt) + z0 * Math.cos(globalTilt);
    const rot = t * 0.18;
    const x2 = x0 * Math.cos(rot) - y1 * Math.sin(rot);
    const y2 = x0 * Math.sin(rot) + y1 * Math.cos(rot);
    const z2 = z1;
    return { sx: CX + x2 * R, sy: CY + y2 * R, depth: z2 };
  }

  function pulseAlpha(phi){
    let total = 0;
    for(const p of pulses){
      const wave = ((phi / Math.PI + p.phase + t * p.speed) % 1 + 1) % 1;
      const dist = Math.min(wave, 1 - wave);
      if(dist < p.width){
        total += (1 - dist / p.width) * 0.85;
      }
    }
    return Math.min(total, 1);
  }

  function draw(){
    ctx.clearRect(0, 0, W, H);

    const dark = isDark();
    const bg1 = dark ? 'rgba(18,18,22,1)' : 'rgba(240,242,248,1)';
    const bg2 = dark ? 'rgba(10,10,14,1)'  : 'rgba(255,255,255,1)';

    const bgGrad = ctx.createRadialGradient(CX, CY, 0, CX, CY, R * 1.5);
    bgGrad.addColorStop(0, bg1);
    bgGrad.addColorStop(1, bg2);
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    const orbFill = ctx.createRadialGradient(CX - 60, CY - 60, 0, CX, CY, R);
    orbFill.addColorStop(0, dark ? 'rgba(30,28,60,0.85)' : 'rgba(200,210,240,0.7)');
    orbFill.addColorStop(1, dark ? 'rgba(10,10,20,0)' : 'rgba(220,225,250,0)');
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, Math.PI * 2);
    ctx.fillStyle = orbFill;
    ctx.fill();

    const rim = ctx.createRadialGradient(CX, CY, R * 0.7, CX, CY, R * 1.05);
    rim.addColorStop(0, 'rgba(100,120,255,0)');
    rim.addColorStop(0.85, dark ? 'rgba(100,120,255,0.08)' : 'rgba(80,100,200,0.06)');
    rim.addColorStop(1,    dark ? 'rgba(140,100,255,0.22)' : 'rgba(100,80,200,0.15)');
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, Math.PI * 2);
    ctx.fillStyle = rim;
    ctx.fill();

    const sorted = dots.map(d => {
      const p = project(d.theta, d.phi);
      return { ...d, ...p };
    }).sort((a, b) => a.depth - b.depth);

    for(const d of sorted){
      const pa = pulseAlpha(d.phi);
      const depth01 = (d.depth + 1) / 2;
      const a = d.baseAlpha * (0.3 + 0.7 * depth01);
      const size = d.size * (0.5 + 0.7 * depth01);

      if(pa > 0.01){
        ctx.beginPath();
        ctx.arc(d.sx, d.sy, size * 2.2 * pa + size, 0, Math.PI * 2);
        ctx.fillStyle = dark
          ? `rgba(160,140,255,${(pa * 0.18 * depth01).toFixed(3)})`
          : `rgba(100,80,200,${(pa * 0.12 * depth01).toFixed(3)})`;
        ctx.fill();
      }

      const fa = pa > 0.01 ? Math.min(1, a + pa * 0.7) : a;
      ctx.beginPath();
      ctx.arc(d.sx, d.sy, size, 0, Math.PI * 2);
      ctx.fillStyle = pa > 0.01
        ? (dark ? `rgba(180,160,255,${fa.toFixed(3)})` : `rgba(120,100,220,${fa.toFixed(3)})`)
        : (dark ? `rgba(110,130,255,${fa.toFixed(3)})` : `rgba(60,80,200,${fa.toFixed(3)})`);
      ctx.fill();
    }

    const gloss = ctx.createRadialGradient(CX - R * 0.38, CY - R * 0.38, 0, CX - R * 0.2, CY - R * 0.2, R * 0.65);
    gloss.addColorStop(0, dark ? 'rgba(200,210,255,0.09)' : 'rgba(255,255,255,0.55)');
    gloss.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, Math.PI * 2);
    ctx.fillStyle = gloss;
    ctx.fill();

    t += 0.016;

    for(const d of dots){
      d.theta += d.speed;
      d.phi = Math.max(0.05, Math.min(Math.PI - 0.05, d.phi + d.phiDrift));
      if(Math.random() < 0.002) d.phiDrift *= -1;
    }

    requestAnimationFrame(draw);
  }

  draw();
})();
</script>
</body>
</html>
