<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Align & Build // Decision Swiper</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0c;
      --surface: #141417;
      --border: rgba(255, 255, 255, 0.1);
      --client-color: #f39c12;
      --designer-color: #9b59b6;
      --gc-color: #2ecc71;
      --text: #f0efe8;
      --text-dim: #88888e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header & Roles */
    header {
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      letter-spacing: -0.5px;
    }

    .role-switcher {
      display: flex;
      gap: 10px;
      background: var(--surface);
      padding: 5px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .role-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.8rem;
      transition: all 0.3s ease;
    }

    .role-btn.active[data-role="client"] {
      background: var(--client-color);
      color: #000;
    }

    .role-btn.active[data-role="designer"] {
      background: var(--designer-color);
      color: #fff;
    }

    .role-btn.active[data-role="gc"] {
      background: var(--gc-color);
      color: #000;
    }

    /* Main Stage */
    main {
      flex: 1;
      display: flex;
      position: relative;
    }

    .panel {
      padding: 30px;
      border-right: 1px solid var(--border);
    }

    #inventory {
      width: 300px;
      overflow-y: auto;
    }

    #stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #consensus {
      width: 350px;
      background: rgba(255, 255, 255, 0.02);
    }

    /* Card Swiper Styling */
    .card-stack {
      position: relative;
      width: 340px;
      height: 460px;
    }

    .card {
      position: absolute;
      width: 100%;
      height: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      cursor: grab;
      transition: transform 0.1s ease, opacity 0.3s ease;
    }

    .card h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .card .category {
      color: var(--text-dim);
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 2px;
    }

    .card .cost-impact {
      margin-top: 20px;
      font-weight: bold;
      color: var(--gc-color);
    }

    /* Consensus List */
    .consensus-item {
      background: var(--surface);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      border-left: 4px solid var(--border);
      font-size: 0.9rem;
    }

    .status-dots {
      display: flex;
      gap: 5px;
      margin-top: 10px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
    }

    .dot.voted {
      background: var(--text);
    }

    .dot.client {
      background: var(--client-color);
    }

    .dot.designer {
      background: var(--designer-color);
    }

    .dot.gc {
      background: var(--gc-color);
    }

    .conflict {
      border-left-color: #e74c3c;
    }

    .locked {
      border-left-color: var(--gc-color);
    }

    /* HUD Controls */
    .controls {
      margin-top: 40px;
      display: flex;
      gap: 20px;
    }

    .btn-swipe {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .btn-swipe:hover {
      transform: scale(1.1);
    }

    .btn-swipe.no:hover {
      border-color: #e74c3c;
      color: #e74c3c;
    }

    .btn-swipe.yes:hover {
      border-color: var(--gc-color);
      color: var(--gc-color);
    }
  </style>
</head>

<body>

  <header>
    <h1>ALIGN & BUILD // V0.1</h1>
    <div class="role-switcher">
      <button class="role-btn active" data-role="client">CLIENT</button>
      <button class="role-btn" data-role="designer">DESIGNER</button>
      <button class="role-btn" data-role="gc">CONTRACTOR (GC)</button>
    </div>
  </header>

  <main>
    <section class="panel" id="inventory">
      <h3 style="margin-bottom: 20px; font-family: Syne;">PENDING ITEMS</h3>
      <div id="item-list-sidebar">
      </div>
    </section>

    <section id="stage">
      <div class="card-stack" id="card-stack">
      </div>

      <div class="controls">
        <button class="btn-swipe no" onclick="handleSwipe('left')">✕</button>
        <button class="btn-swipe yes" onclick="handleSwipe('right')">✓</button>
      </div>
    </section>

    <section class="panel" id="consensus">
      <h3 style="margin-bottom: 20px; font-family: Syne;">ALIGNMENT STATUS</h3>
      <div id="consensus-list">
      </div>
    </section>
  </main>

  <script>
    const items = [
      { id: 1, title: "Exposed Mass Timber", category: "Structural", gc: "High Cost", desc: "Sustainable but adds 12% to structural budget." },
      { id: 2, title: "Triple Glazed Units", category: "Facade", gc: "Long Lead", desc: "Superior R-value, requires 20-week lead time." },
      { id: 3, title: "Polished Concrete", category: "Finishes", gc: "Standard", desc: "Industrial look, durable, cost-effective." },
      { id: 4, title: "Smart Lighting Mesh", category: "MEP", gc: "Specialist", desc: "App-controlled dimming for entire floor plate." }
    ];

    let currentRole = 'client';
    let currentItemIndex = 0;
    let decisions = {}; // { itemId: { client: null, designer: null, gc: null } }

    // Initialize
    function init() {
      items.forEach(item => {
        decisions[item.id] = { client: null, designer: null, gc: null };
      });
      renderCard();
      updateSidebar();
    }

    function renderCard() {
      const stack = document.getElementById('card-stack');
      stack.innerHTML = '';

      if (currentItemIndex >= items.length) {
        stack.innerHTML = `<div class="card"><h2>Deck Complete</h2><p>Check the Alignment Status for next steps.</p></div>`;
        return;
      }

      const item = items[currentItemIndex];
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div>
            <span class="category">${item.category}</span>
            <h2>${item.title}</h2>
            <p>${item.desc}</p>
        </div>
        <div class="cost-impact">Impact: ${item.gc}</div>
    `;
      stack.appendChild(card);
    }

    function handleSwipe(direction) {
      if (currentItemIndex >= items.length) return;

      const itemId = items[currentItemIndex].id;
      decisions[itemId][currentRole] = (direction === 'right');

      // Animate and move to next
      currentItemIndex++;
      renderCard();
      updateConsensus();
    }

    function updateConsensus() {
      const list = document.getElementById('consensus-list');
      list.innerHTML = '';

      items.forEach(item => {
        const votes = decisions[item.id];
        const hasVoted = Object.values(votes).some(v => v !== null);

        if (hasVoted) {
          const isLocked = votes.client && votes.designer && votes.gc;
          const isConflict = Object.values(votes).includes(false) && Object.values(votes).includes(true);

          const div = document.createElement('div');
          div.className = `consensus-item ${isLocked ? 'locked' : ''} ${isConflict ? 'conflict' : ''}`;
          div.innerHTML = `
                <strong>${item.title}</strong>
                <div class="status-dots">
                    <div class="dot ${votes.client === null ? '' : (votes.client ? 'client' : 'voted')}"></div>
                    <div class="dot ${votes.designer === null ? '' : (votes.designer ? 'designer' : 'voted')}"></div>
                    <div class="dot ${votes.gc === null ? '' : (votes.gc ? 'gc' : 'voted')}"></div>
                </div>
                <div style="font-size: 0.7rem; margin-top: 5px; color: var(--text-dim)">
                    ${isLocked ? 'GREENLIT' : (isConflict ? 'CONFLICT: REQUIRES MEETING' : 'Awaiting others...')}
                </div>
            `;
          list.appendChild(div);
        }
      });
    }

    function updateSidebar() {
      const list = document.getElementById('item-list-sidebar');
      items.forEach(item => {
        const div = document.createElement('div');
        div.style.padding = "10px";
        div.style.borderBottom = "1px solid var(--border)";
        div.style.fontSize = "0.8rem";
        div.style.color = "var(--text-dim)";
        div.innerText = item.title;
        list.appendChild(div);
      });
    }

    // Role Switching
    document.querySelectorAll('.role-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentRole = btn.dataset.role;
        // Reset view for new role to swipe through
        currentItemIndex = 0;
        renderCard();
      });
    });

    init();
  </script>
</body>

</html>
