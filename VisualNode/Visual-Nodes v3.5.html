<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Visual Nodes Pro | Elite Edition</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.css">
    <style>
        :root {
            --bg: #0b0f1a;
            --grid: rgba(59, 130, 246, 0.05);
            --panel: #161e2e;
            --text: #f8fafc;
            --muted: #64748b;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: var(--text);
            background: var(--bg);
            overflow: hidden;
        }

        #toolbar {
            height: 60px;
            padding: 0 24px;
            background: rgba(11, 15, 26, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            gap: 12px;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 100;
            position: relative;
        }

        .logo {
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        button {
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--panel);
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }

        button:hover {
            background: #2563eb;
            border-color: transparent;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        #drawflow {
            width: 100vw;
            height: calc(100vh - 60px);
            background-color: var(--bg);
            background-image: linear-gradient(var(--grid) 1.5px, transparent 1.5px), linear-gradient(90deg, var(--grid) 1.5px, transparent 1.5px);
            background-size: 50px 50px;
        }

        /* Enhanced Node Styling */
        .drawflow .drawflow-node {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            min-width: 180px;
            transition: box-shadow 0.3s;
        }

        .drawflow .drawflow-node.selected {
            border-color: var(--accent);
            box-shadow: 0 0 25px var(--accent-glow);
        }

        .node-header {
            padding: 10px 14px;
            border-radius: 10px 10px 0 0;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
        }

        /* Color Coding */
        .header-math {
            color: #60a5fa;
            border-bottom: 2px solid #60a5fa;
        }

        .header-io {
            color: #34d399;
            border-bottom: 2px solid #34d399;
        }

        .header-logic {
            color: #a78bfa;
            border-bottom: 2px solid #a78bfa;
        }

        .node-body {
            padding: 15px;
        }

        input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            padding: 8px;
            border-radius: 4px;
            text-align: center;
        }

        .display-screen {
            background: #000;
            color: #10b981;
            font-family: monospace;
            font-size: 20px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #064e3b;
            text-align: center;
            box-shadow: inset 0 0 10px #10b98122;
        }

        /* Connection Curves */
        .drawflow .connection .main-path {
            stroke: var(--accent);
            stroke-width: 4px;
            stroke-linecap: round;
        }

        .drawflow .drawflow-node .input,
        .drawflow .drawflow-node .output {
            width: 12px;
            height: 12px;
            background: #475569;
            border: 2px solid var(--bg);
        }

        .drawflow .drawflow-node .input:hover,
        .drawflow .drawflow-node .output:hover {
            background: var(--accent);
        }

        /* Context Menu Styling */
        #context-menu {
            position: absolute;
            background: var(--panel);
            border: 1px solid var(--muted);
            border-radius: 8px;
            padding: 5px;
            display: none;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .menu-item {
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
        }

        .menu-item:hover {
            background: var(--accent);
        }
    </style>
</head>

<body>

    <div id="toolbar">
        <div class="logo">NODE_PRO v3</div>
        <button onclick="addNode('Value')">+ Input</button>
        <button onclick="addNode('Add')">+ Add</button>
        <button onclick="addNode('Multiply')">+ Multiply</button>
        <button onclick="addNode('Display')">+ Output</button>
        <div style="flex:1"></div>
        <button style="background: var(--success);" onclick="runPipeline()">EXECUTE SYSTEM ▶</button>
        <button onclick="editor.clearModuleSelected()">Reset</button>
    </div>

    <div id="drawflow" oncontextmenu="showMenu(event)"></div>

    <div id="context-menu">
        <div class="menu-item" onclick="addNodeAtPos('Value')">Add Input</div>
        <div class="menu-item" onclick="addNodeAtPos('Add')">Add Math (+)</div>
        <div class="menu-item" onclick="addNodeAtPos('Multiply')">Add Math (×)</div>
        <div class="menu-item" onclick="addNodeAtPos('Display')">Add Display</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.js"></script>
    <script>
        const editor = new Drawflow(document.getElementById("drawflow"));
        editor.start();

        let mouseX = 0, mouseY = 0;
        const menu = document.getElementById('context-menu');

        const templates = {
            Value: {
                html: `<div class="node-header header-io">Input <span>NUM</span></div>
                       <div class="node-body"><input type="number" class="val" value="10" df-value></div>`,
                in: 0, out: 1
            },
            Add: {
                html: `<div class="node-header header-math">Addition <span>+</span></div>
                       <div class="node-body" style="display:flex; justify-content:space-between; color:var(--muted); font-size:10px;">
                       <span>A</span><span>B</span><span>OUT</span></div>`,
                in: 2, out: 1
            },
            Multiply: {
                html: `<div class="node-header header-math">Multiply <span>×</span></div>
                       <div class="node-body" style="display:flex; justify-content:space-between; color:var(--muted); font-size:10px;">
                       <span>A</span><span>B</span><span>OUT</span></div>`,
                in: 2, out: 1
            },
            Display: {
                html: `<div class="node-header header-io">Result <span>OUT</span></div>
                       <div class="node-body"><div class="display-screen" id="disp-_ID_">---</div></div>`,
                in: 1, out: 0
            }
        };

        function addNode(name) {
            const t = templates[name];
            const id = editor.addNode(name, t.in, t.out, 100, 100, name, {}, t.html.replace('_ID_', ''));
            updateDisplayIds(id, name);
        }

        // Context Menu Logic
        function showMenu(e) {
            e.preventDefault();
            mouseX = e.clientX;
            mouseY = e.clientY;
            menu.style.display = 'block';
            menu.style.left = mouseX + 'px';
            menu.style.top = mouseY + 'px';
        }

        window.onclick = () => menu.style.display = 'none';

        function addNodeAtPos(name) {
            const t = templates[name];
            const canvasX = (mouseX - editor.container.offsetLeft) * (editor.precanvas.clientWidth / (editor.precanvas.clientWidth * editor.zoom)) - (editor.canvas_x / editor.zoom);
            const canvasY = (mouseY - editor.container.offsetTop) * (editor.precanvas.clientHeight / (editor.precanvas.clientHeight * editor.zoom)) - (editor.canvas_y / editor.zoom);
            const id = editor.addNode(name, t.in, t.out, canvasX, canvasY, name, {}, t.html.replace('_ID_', ''));
            updateDisplayIds(id, name);
        }

        function updateDisplayIds(id, name) {
            setTimeout(() => {
                if (name === 'Display') {
                    const el = document.querySelector(`#node-${id} .display-screen`);
                    if (el) el.id = `disp-${id}`;
                }
            }, 10);
        }

        // Logic Engine
        async function runPipeline() {
            const data = editor.export().drawflow.Home.data;
            const cache = new Map();

            function solve(id) {
                if (!id || !data[id]) return 0;
                if (cache.has(id)) return cache.get(id);

                const node = data[id];
                let val = 0;

                if (node.name === 'Value') {
                    val = parseFloat(document.querySelector(`#node-${id} .val`).value) || 0;
                } else if (node.name === 'Add') {
                    const a = solve(node.inputs.input_1.connections[0]?.node);
                    const b = solve(node.inputs.input_2.connections[0]?.node);
                    val = a + b;
                } else if (node.name === 'Multiply') {
                    const a = solve(node.inputs.input_1.connections[0]?.node);
                    const b = solve(node.inputs.input_2.connections[0]?.node);
                    val = a * b;
                } else if (node.name === 'Display') {
                    val = solve(node.inputs.input_1.connections[0]?.node);
                    const screen = document.getElementById(`disp-${id}`);
                    if (screen) screen.innerText = val.toLocaleString();
                }

                cache.set(id, val);
                return val;
            }

            Object.keys(data).forEach(id => { if (data[id].name === 'Display') solve(id); });
        }
    </script>
</body>

</html>
